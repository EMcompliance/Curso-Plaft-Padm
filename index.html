<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Plataforma e-Learning PLAFT · HSA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    /* --- Ancla institucional --- */
    --navy:#1B3A5C; --navy-deep:#0F2540; --ink:#0B1F33; --body:#33475A; --muted:#5C6B7A;
    /* --- Superficies --- */
    --paper:#FAF9F5; --surface:#FFFFFF; --line:rgba(11,31,51,0.12); --line-strong:rgba(11,31,51,0.22);
    /* --- Funcional --- */
    --accent:#2E6BA6; --accent-soft:#E4EBF2;
    --risk-low:#2E8B57; --risk-mid:#C6841F; --risk-high:#B0342F;
    --red:#B0342F; --redsoft:#E7A9A4; --white:#FFFFFF;
    --brand:#B0342F; --brand-soft:#E7A9A4;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{font-family:'IBM Plex Sans',Arial,Helvetica,sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;}
  button{font-family:inherit;}
  a{color:var(--accent);} a:hover{color:var(--navy-deep);}
  .mono{font-family:'IBM Plex Mono',ui-monospace,Consolas,monospace;font-variant-numeric:tabular-nums;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  @keyframes slideUp{from{transform:translateY(24px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  @keyframes stampIn{0%{opacity:0;transform:scale(1.5) rotate(-8deg);}60%{opacity:1;}100%{opacity:1;transform:scale(1) rotate(-4deg);}}
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important;}
    html{scroll-behavior:auto;}
  }

  /* ---------- Registration marks (firma visual) ---------- */
  .regmarks{position:absolute;inset:22px;pointer-events:none;opacity:.5;}
  .regmarks i{position:absolute;width:18px;height:18px;border:1.5px solid rgba(255,255,255,0.55);}
  .regmarks i:nth-child(1){top:0;left:0;border-right:none;border-bottom:none;}
  .regmarks i:nth-child(2){top:0;right:0;border-left:none;border-bottom:none;}
  .regmarks i:nth-child(3){bottom:0;left:0;border-right:none;border-top:none;}
  .regmarks i:nth-child(4){bottom:0;right:0;border-left:none;border-top:none;}
  .darktext .regmarks i{border-color:rgba(11,31,51,0.28);}

  /* ---------- Header ---------- */
  header.appbar{position:sticky;top:0;z-index:40;background:var(--navy-deep);color:#fff;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 24px;border-bottom:1px solid rgba(255,255,255,0.08);flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:12px;min-width:0;}
  .brand-badge{width:38px;height:38px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:11px;letter-spacing:.5px;flex-shrink:0;background:var(--brand);color:#fff;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;}
  .brand-txt{display:flex;flex-direction:column;line-height:1.25;min-width:0;}
  .brand-txt b{font-size:13.5px;font-weight:600;letter-spacing:.15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .brand-txt span{font-size:11px;font-family:'IBM Plex Mono',monospace;letter-spacing:.4px;text-transform:uppercase;opacity:.6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .hdr-tools{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .hdr-logo-wrap{display:flex;align-items:center;gap:4px;}
  .hdr-logo{max-height:30px;display:flex;align-items:center;}
  .hdr-logo img{max-height:30px;max-width:120px;display:block;}
  .hdr-logo-btn{display:flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;border:1px solid var(--line);background:var(--surface);color:var(--muted);cursor:pointer;font-size:12px;flex-shrink:0;}
  .hdr-logo-btn:hover{border-color:var(--accent);color:var(--accent);}
  .pillgroup{display:flex;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.16);border-radius:999px;padding:3px;gap:2px;}
  .pillgroup button{border:none;padding:6px 13px;border-radius:999px;font-size:11.5px;font-weight:600;letter-spacing:.3px;cursor:pointer;background:transparent;color:rgba(255,255,255,0.7);font-family:'IBM Plex Mono',monospace;}
  .pillgroup button.on{background:#fff;color:var(--navy-deep);}
  .hbtn{display:flex;align-items:center;gap:8px;background:transparent;border:1px solid rgba(255,255,255,0.22);color:#fff;padding:8px 14px;border-radius:7px;font-size:11.5px;font-weight:600;letter-spacing:.3px;cursor:pointer;white-space:nowrap;text-transform:uppercase;}
  .hbtn:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.4);}
  .hbtn.solid{background:#fff;color:var(--navy-deep);border-color:#fff;}
  .hamb{display:flex;flex-direction:column;gap:3px;}
  .hamb span{width:14px;height:1.5px;background:currentColor;display:block;}

  /* ---------- Progress ---------- */
  .progresswrap{position:sticky;top:63px;z-index:39;background:var(--surface);border-bottom:1px solid var(--line);}
  .progresstrack{height:3px;background:var(--line);}
  .progressfill{height:100%;width:0%;transition:width .15s ease;background:var(--accent);}
  .progressmeta{display:flex;justify-content:space-between;gap:10px;padding:6px 24px;font-size:10.5px;color:var(--muted);font-weight:600;letter-spacing:.5px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;}

  /* ---------- Hero ---------- */
  .hero{background:var(--navy-deep);color:#fff;padding:96px 24px 108px;text-align:center;position:relative;overflow:hidden;}
  .hero-inner{max-width:740px;margin:0 auto;position:relative;}
  .hero .tag{display:inline-flex;align-items:center;gap:10px;font-family:'IBM Plex Mono',monospace;font-size:11.5px;font-weight:500;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,0.6);padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,0.2);margin-bottom:30px;}
  .hero .modlabel{font-family:'IBM Plex Mono',monospace;font-size:12.5px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--brand-soft);margin-bottom:16px;}
  .hero h1{font-size:44px;font-weight:600;line-height:1.14;letter-spacing:-0.4px;margin:0 0 18px;color:#fff;}
  .hero p.sub{font-size:17.5px;line-height:1.65;color:rgba(255,255,255,0.78);margin:0 0 36px;font-weight:400;}
  .hero .stats{display:flex;align-items:center;justify-content:center;gap:0;flex-wrap:wrap;font-size:12.5px;font-weight:500;color:rgba(255,255,255,0.78);font-family:'IBM Plex Mono',monospace;letter-spacing:.2px;}
  .hero .stats span{padding:0 20px;border-right:1px solid rgba(255,255,255,0.18);}
  .hero .stats span:last-child{border-right:none;}
  @media(max-width:640px){.hero h1{font-size:30px;} .hero{padding:64px 20px 88px;} .hero .stats span{border-right:none;padding:4px 14px;}}

  /* ---------- Hero con texto oscuro (fondos claros) ---------- */
  .hero.darktext h1{color:var(--ink);}
  .hero.darktext p.sub{color:var(--body);}
  .hero.darktext .stats{color:var(--muted);}
  .hero.darktext .stats span{border-right-color:var(--line-strong);}
  .hero.darktext .modlabel{color:var(--brand);}
  .hero.darktext .tag{color:var(--muted);border-bottom-color:var(--line-strong);}

  /* ---------- Sections ---------- */
  section.blk{padding:92px 24px;position:relative;overflow:hidden;}
  section.blk.light{background:var(--paper);}
  section.blk.navy{background:var(--navy-deep);}
  .blk-inner{max-width:1040px;margin:0 auto;position:relative;}
  .blk h2{display:flex;align-items:baseline;gap:16px;font-size:27px;font-weight:600;letter-spacing:-.2px;margin:0 0 34px;padding-bottom:20px;border-bottom:1px solid var(--line);max-width:760px;}
  .blk h2 .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:var(--accent);flex-shrink:0;}
  .blk.light h2{color:var(--ink);border-color:var(--line);}
  .blk.navy h2{color:#fff;border-color:rgba(255,255,255,0.16);}
  .blk.navy h2 .eyebrow{color:rgba(255,255,255,0.55);}
  .reveal{opacity:0;transform:translateY(22px);transition:opacity .55s ease,transform .55s ease;}
  .reveal.vis{opacity:1;transform:translateY(0);}

  /* ---------- Blocks ---------- */
  .b-wrap{margin-bottom:22px;}
  .block-spacer{margin-bottom:0;}
  .block-spacer .b-wrap{margin-bottom:0 !important;}
  .b-text{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:26px 28px;}
  .blk.navy .b-text{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.14);}
  .b-text .txt{font-size:var(--txt-size,15.5px);line-height:1.75;color:var(--body);white-space:pre-wrap;word-wrap:break-word;}
  .blk.navy .b-text .txt{color:rgba(255,255,255,0.82);}
  .b-media{border-radius:8px;overflow:hidden;background:rgba(11,31,51,0.05);border:1px solid var(--line);}
  .blk.navy .b-media{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.14);}
  .b-media img{width:100%;display:block;object-fit:cover;max-height:520px;}
  .b-media video{width:100%;display:block;max-height:560px;background:#000;}
  .b-audio{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:20px 22px;display:flex;flex-direction:column;gap:12px;}
  .blk.navy .b-audio{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.14);}
  .b-audio audio{width:100%;}
  .b-caption{font-size:12.5px;color:var(--muted);margin-top:10px;line-height:1.5;font-family:'IBM Plex Mono',monospace;}
  .blk.navy .b-caption{color:rgba(255,255,255,0.55);}
  .b-empty{border:1px dashed var(--line-strong);border-radius:8px;padding:34px;text-align:center;color:var(--muted);font-size:13.5px;background:rgba(11,31,51,0.025);}
  .blk.navy .b-empty{border-color:rgba(255,255,255,0.24);color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.03);}

  /* quiz */
  .b-quiz{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:26px 28px;}
  .blk.navy .b-quiz{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.14);}
  .b-quiz .q{font-size:16px;font-weight:600;color:var(--ink);margin-bottom:18px;line-height:1.5;}
  .blk.navy .b-quiz .q{color:#fff;}
  .b-quiz .opt{display:flex;align-items:flex-start;gap:12px;padding:13px 4px;border:none;border-bottom:1px solid var(--line);margin-bottom:0;cursor:pointer;font-size:14.5px;color:var(--body);line-height:1.5;background:transparent;border-left:2px solid transparent;transition:border-color .15s,padding-left .15s,background .15s;}
  .b-quiz .opt:hover{border-left-color:var(--accent);padding-left:12px;background:rgba(46,107,166,0.04);}
  .blk.navy .b-quiz .opt{border-bottom-color:rgba(255,255,255,0.14);color:rgba(255,255,255,0.82);}
  .b-quiz .opt.sel-ok{border-left-color:var(--risk-low);padding-left:12px;background:rgba(46,139,87,0.07);}
  .b-quiz .opt.sel-bad{border-left-color:var(--risk-high);padding-left:12px;background:rgba(176,52,47,0.06);}
  .b-quiz .opt.sel-chosen{border-left-color:var(--accent);padding-left:12px;background:rgba(46,107,166,0.07);}
  .b-quiz .dot{width:7px;height:7px;border-radius:1px;background:var(--accent);margin-top:7px;flex-shrink:0;transform:rotate(45deg);}
  .b-quiz .dot.sq{width:14px;height:14px;border-radius:3px;background:transparent;border:1.5px solid var(--accent);transform:none;margin-top:2px;}
  .b-quiz .dot.sq.on{background:var(--accent);}
  .blk.navy .b-quiz .dot.sq{border-color:rgba(255,255,255,0.5);}
  .blk.navy .b-quiz .dot.sq.on{background:var(--accent);border-color:var(--accent);}
  .b-quiz .fb{font-size:13px;font-weight:600;margin-top:14px;font-family:'IBM Plex Mono',monospace;}
  .b-quiz .fb.ok{color:var(--risk-low);} .b-quiz .fb.bad{color:var(--risk-high);}
  .blk.navy .b-quiz .fb.ok{color:#7FCBA0;} .blk.navy .b-quiz .fb.bad{color:var(--redsoft);}

  /* ---------- CTA / nav footer ---------- */
  .cta{background:var(--navy-deep);color:#fff;padding:96px 24px;text-align:center;position:relative;overflow:hidden;}
  .exam-result-screen.pass{background:linear-gradient(180deg,var(--navy-deep) 0%,#0d3a2b 140%);}
  .exam-result-screen.fail{background:linear-gradient(180deg,var(--navy-deep) 0%,#3a1512 140%);}
  .exam-screen-icon{font-size:64px;line-height:1;margin-bottom:10px;}
  .exam-screen-logo{position:relative;z-index:2;margin-bottom:16px;display:flex;justify-content:center;}
  .exam-screen-logo img{max-height:52px;max-width:220px;display:block;}
  .exam-screen-score{font-family:'IBM Plex Mono',monospace;font-size:52px;font-weight:700;margin:6px 0 18px;}
  .exam-result-screen.pass .exam-screen-score{color:#6bdb9e;}
  .exam-result-screen.fail .exam-screen-score{color:#ff9b93;}
  .cta h2{font-size:27px;font-weight:600;color:#fff;margin:0 0 14px;letter-spacing:-.2px;}
  .cta p{font-size:15.5px;line-height:1.6;color:rgba(255,255,255,0.72);max-width:560px;margin:0 auto 34px;}
  .cta-motivation{font-family:'IBM Plex Mono',monospace;font-size:12.5px;letter-spacing:.3px;color:var(--brand-soft);background:rgba(255,255,255,0.07);border-radius:999px;padding:8px 20px;display:inline-block;margin:-14px auto 30px;}
  .exam-info-banner{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin:14px auto;}
  .exam-info-item{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.16);border-radius:8px;padding:8px 16px;display:flex;flex-direction:column;gap:2px;min-width:120px;}
  .exam-info-lbl{font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.6px;text-transform:uppercase;color:rgba(255,255,255,0.55);}
  .exam-info-val{font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:700;color:#fff;}
  .exam-info-banner-top{max-width:900px;margin-left:auto;margin-right:auto;padding:0 24px 18px;}
  .light .exam-info-item{background:rgba(11,31,51,0.05);border-color:rgba(11,31,51,0.1);}
  .light .exam-info-lbl{color:var(--muted);}
  .light .exam-info-val{color:var(--navy-deep);}
  .cta-motivation{font-size:14px;font-style:italic;color:rgba(255,255,255,0.85);max-width:480px;margin:-18px auto 30px;padding:10px 18px;border-left:2px solid rgba(255,255,255,0.35);text-align:left;display:inline-block;}
  .cta .btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
  .cbtn{padding:13px 26px;border-radius:6px;font-size:12px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;cursor:pointer;border:1px solid rgba(255,255,255,0.3);background:transparent;color:#fff;font-family:'IBM Plex Mono',monospace;}
  .cbtn:hover:not(:disabled){border-color:rgba(255,255,255,0.6);}
  .cbtn.primary{background:#fff;color:var(--navy-deep);border-color:#fff;}
  .cbtn:disabled{opacity:.35;cursor:default;}

  /* ---------- Drawer (índice de módulos) ---------- */
  .scrim{position:fixed;inset:0;background:rgba(11,31,51,0.5);z-index:60;opacity:0;pointer-events:none;transition:opacity .25s;}
  .scrim.open{opacity:1;pointer-events:auto;}
  .drawer{position:fixed;top:0;right:0;bottom:0;width:min(420px,92vw);background:var(--surface);z-index:61;transform:translateX(105%);transition:transform .28s ease;box-shadow:-8px 0 32px rgba(0,0,0,0.18);display:flex;flex-direction:column;}
  .drawer.open{transform:translateX(0);}
  .drawer-head{background:var(--navy-deep);color:#fff;padding:18px 22px;display:flex;align-items:center;justify-content:space-between;}
  .drawer-head b{font-size:14px;font-weight:600;letter-spacing:.3px;}
  .drawer-head button{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;line-height:1;}
  .drawer-body{flex:1;overflow-y:auto;padding:16px;}
  .mod-item{border:1px solid var(--line);border-radius:8px;padding:13px 15px;margin-bottom:10px;background:var(--surface);display:flex;align-items:center;gap:12px;}
  .mod-item.cur{border-color:var(--accent);border-width:1.5px;}
  .mod-item.locked{opacity:.55;}
  .mod-item .score{font-size:10.5px;font-family:'IBM Plex Mono',monospace;color:var(--muted);margin-left:6px;}
  .mod-item .num{width:32px;height:32px;border:1px solid var(--line-strong);color:var(--navy-deep);font-weight:600;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'IBM Plex Mono',monospace;}
  .mod-item.cur .num{background:var(--navy-deep);color:#fff;border-color:var(--navy-deep);}
  .mod-item .info{flex:1;min-width:0;cursor:pointer;}
  .mod-item .info b{display:block;font-size:13.5px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .mod-item .info span{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.3px;}
  .mod-item .acts{display:flex;gap:4px;}
  .mod-sections{margin:-4px 0 12px 44px;display:flex;flex-direction:column;gap:2px;}
  .mod-sec-item{font-size:12px;color:var(--muted);padding:4px 8px;border-radius:5px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .mod-sec-item:hover{background:var(--accent-soft);color:var(--accent);}
  .ibtn{width:26px;height:26px;border-radius:5px;border:1px solid var(--line);background:var(--surface);color:var(--muted);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;}
  .ibtn:hover{border-color:var(--accent);color:var(--accent);}
  .ibtn.danger:hover{border-color:var(--red);color:var(--red);}
  .drawer-foot{padding:16px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:9px;overflow-y:auto;flex-shrink:1;min-height:0;max-height:60vh;}
  .drawer-section-title{font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--accent);background:var(--accent-soft);padding:6px 10px;border-radius:5px;margin-top:8px;margin-bottom:2px;}
  .drawer-section-title:first-child{margin-top:0;}
  .wbtn{width:100%;padding:11px;border-radius:6px;font-size:12px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;cursor:pointer;border:1px solid var(--line);background:var(--surface);color:var(--navy-deep);font-family:'IBM Plex Mono',monospace;}
  .wbtn.primary{background:var(--navy-deep);color:#fff;border-color:var(--navy-deep);}
  .wbtn.primary:hover{background:var(--navy);}
  .wbtn:hover:not(.primary){border-color:var(--line-strong);}

  /* ---------- Edit mode ---------- */
  body.editing [data-edit]{outline:1.5px dashed rgba(46,107,166,0.55);outline-offset:3px;border-radius:3px;min-height:1em;cursor:text;}
  body.editing [data-edit]:focus{outline:2px solid var(--accent);background:var(--accent-soft);}
  body.editing .hero [data-edit]:focus,body.editing .navy [data-edit]:focus,body.editing .cta [data-edit]:focus{background:rgba(255,255,255,0.12);}
  .etools{display:none;align-items:center;gap:6px;flex-wrap:wrap;margin:10px 0 0;}
  body.editing .etools{display:flex;}
  .ebtn{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);color:var(--navy-deep);padding:6px 12px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;cursor:pointer;font-family:'IBM Plex Mono',monospace;}
  .ebtn:hover{border-color:var(--accent);color:var(--accent);}
  .ebtn.danger{color:var(--red);} .ebtn.danger:hover{border-color:var(--red);}
  .navy .ebtn,.cta .ebtn,.hero .ebtn{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.24);color:#fff;}
  .addbar{display:none;justify-content:center;gap:8px;flex-wrap:wrap;padding:18px;border:1px dashed var(--line-strong);border-radius:8px;margin-top:22px;}
  body.editing .addbar{display:flex;}
  .navy .addbar{border-color:rgba(255,255,255,0.26);}
  .secbar{display:none;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:18px;padding:9px 13px;background:var(--accent-soft);border:1px solid rgba(46,107,166,0.25);border-radius:6px;}
  body.editing .secbar{display:flex;}
  .navy .secbar{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.2);}
  .secbar .lbl{font-size:10.5px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--navy-deep);font-family:'IBM Plex Mono',monospace;}
  .navy .secbar .lbl{color:rgba(255,255,255,0.8);}
  .secbar .grp{display:flex;gap:6px;flex-wrap:wrap;}
  .addsec{display:none;justify-content:center;padding:26px 24px;}
  body.editing .addsec{display:flex;gap:10px;flex-wrap:wrap;}
  body:not(.editing) .editonly{display:none !important;}

  /* ---------- Disposiciones (layouts) ---------- */
  .blkgrid{display:grid;gap:22px;align-items:start;}
  .blkgrid.cols2{grid-template-columns:1fr 1fr;}
  .blkgrid.split{grid-template-columns:1.05fr 0.95fr;}
  .blkgrid.split.rev .col:first-child{order:2;}
  .blkgrid .col{display:flex;flex-direction:column;gap:22px;min-width:0;}
  .blkgrid .b-wrap{margin-bottom:0;}
  .blkgrid .block-spacer{margin-bottom:0 !important;}
  .blknarrow{max-width:660px;margin:0 auto;}
  @media(max-width:760px){.blkgrid.cols2,.blkgrid.split{grid-template-columns:1fr;}.blkgrid.split.rev .col:first-child{order:0;}}

  /* ---------- Control deslizante de tamaño (universal por bloque) ---------- */
  .size-slider-wrap{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:6px;padding:4px 10px;}
  .navy .size-slider-wrap{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.18);}
  .size-slider-lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);white-space:nowrap;}
  .navy .size-slider-lbl{color:rgba(255,255,255,0.6);}
  .size-slider-wrap input[type="range"]{width:70px;accent-color:var(--accent);cursor:pointer;}
  .size-slider-val{font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;color:var(--ink);min-width:32px;}
  .navy .size-slider-val{color:#fff;}

  /* ---------- Posición libre (arrastrar y soltar, sobre toda la slide) ---------- */
  .free-item{box-sizing:border-box;position:absolute;z-index:3;}
  .free-item .b-wrap{margin-bottom:0 !important;height:100%;}
  .free-item-inner{width:100%;height:100%;overflow:auto;}
  .free-item-inner .b-media,.free-item-inner .b-media img,.free-item-inner .b-media video{width:100%;height:100%;}
  .free-item-inner .b-media img,.free-item-inner .b-media video{object-fit:cover;}
  .free-handle{position:absolute;width:24px;height:24px;background:var(--navy-deep);color:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;z-index:6;user-select:none;box-shadow:0 2px 8px rgba(0,0,0,0.25);}
  .free-handle.move{top:-12px;left:-12px;cursor:grab;}
  .free-handle.resize{bottom:-12px;right:-12px;cursor:nwse-resize;}
  body:not(.editing) .free-handle{display:none !important;}
  .free-canvas-resize{position:absolute;left:0;right:0;bottom:0;height:20px;display:none;align-items:center;justify-content:center;gap:10px;cursor:ns-resize;color:var(--muted);font-size:11px;font-family:'IBM Plex Mono',monospace;user-select:none;border-top:1px dashed var(--line-strong);z-index:4;background:rgba(255,255,255,0.7);}
  body.editing .free-canvas-resize{display:flex;}
  .navy .free-canvas-resize{background:rgba(15,37,64,0.7);color:rgba(255,255,255,0.7);border-top-color:rgba(255,255,255,0.25);}
  .free-canvas-resize .ebtn{padding:3px 9px;font-size:9.5px;cursor:pointer;}
  @media(max-width:640px){
    .blk-inner{min-height:0 !important;}
    .free-item{position:static !important;width:100% !important;height:auto !important;margin-bottom:16px;}
    .free-canvas-resize{display:none !important;}
  }

  /* ---------- Subtítulo de sección ---------- */
  .sec-subtitle{font-size:16px;color:var(--muted);margin:-18px 0 26px;max-width:760px;line-height:1.5;}
  .blk.navy .sec-subtitle{color:rgba(255,255,255,0.68);}

  /* ---------- Panel de estilo ---------- */
  .stylepanel{position:fixed;right:18px;top:128px;width:308px;max-height:calc(100vh - 160px);overflow-y:auto;background:var(--surface);border:1px solid var(--line);border-radius:10px;box-shadow:0 18px 48px rgba(0,0,0,0.24);z-index:70;display:none;animation:slideUp .22s ease;}
  .stylepanel.open{display:block;}
  .sp-head{position:sticky;top:0;background:var(--navy-deep);color:#fff;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;border-radius:10px 10px 0 0;z-index:1;}
  .sp-head b{font-size:13px;font-weight:600;}
  .sp-head button{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;line-height:1;}
  .sp-body{padding:14px 16px 18px;}
  .sp-row{margin-bottom:14px;}
  .sp-label{display:block;font-size:10.5px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-family:'IBM Plex Mono',monospace;}
  .sp-row select,.sp-row input[type="text"]{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:6px;font-size:13px;font-family:'IBM Plex Sans',inherit;color:var(--ink);background:var(--surface);}
  .sp-colors{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .sp-colors label{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--body);font-weight:600;}
  .sp-colors input[type="color"]{width:34px;height:28px;border:1px solid var(--line);border-radius:5px;padding:2px;background:var(--surface);cursor:pointer;}
  .sp-row input[type="range"]{width:100%;}
  .sp-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
  .sp-note{font-size:11px;color:var(--muted);line-height:1.5;margin-top:4px;}
  .cert-logo-preview{background:var(--surface);border:1px solid var(--line);border-radius:6px;padding:10px;display:flex;align-items:center;justify-content:center;min-height:50px;margin-bottom:8px;}
  .verify-ok{margin-top:8px;font-size:12px;font-weight:600;color:var(--risk-low);background:rgba(46,139,87,0.08);border-radius:6px;padding:8px 10px;}
  .verify-bad{margin-top:8px;font-size:12px;font-weight:600;color:var(--risk-high);background:rgba(176,52,47,0.06);border-radius:6px;padding:8px 10px;}
  .verify-inputrow{display:flex;gap:6px;}
  .verify-inputrow input[type="text"]{flex:1 1 auto;width:auto;min-width:0;}
  .verify-inputrow button{flex:0 0 auto;}

  /* ---------- Texto enriquecido (negrita, cursiva, listas, color, enlaces) ---------- */
  .fmtbar{display:none;align-items:center;gap:2px;flex-wrap:wrap;padding:6px 7px;margin-bottom:10px;background:var(--paper);border:1px solid var(--line);border-radius:6px;}
  body.editing .fmtbar{display:flex;}
  .navy .fmtbar{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.16);}
  .fmtbtn{width:27px;height:25px;display:inline-flex;align-items:center;justify-content:center;border:1px solid transparent;border-radius:4px;background:transparent;color:var(--ink);font-size:12.5px;font-weight:600;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;padding:0;}
  .fmtbtn:hover{background:var(--accent-soft);border-color:var(--line);}
  .navy .fmtbtn{color:#fff;}
  .navy .fmtbtn:hover{background:rgba(255,255,255,0.16);border-color:rgba(255,255,255,0.24);}
  .fmtsep{width:1px;height:17px;background:var(--line);margin:0 4px;flex-shrink:0;}
  .navy .fmtsep{background:rgba(255,255,255,0.22);}
  .txt-rich{outline:none;}
  .txt-rich a{text-decoration:underline;}
  .txt-rich ul,.txt-rich ol{padding-left:22px;margin:8px 0;}
  .txt-rich li{margin-bottom:4px;}
  body.editing .txt-rich{outline:1.5px dashed rgba(46,107,166,0.4);outline-offset:4px;border-radius:4px;cursor:text;min-height:1.5em;}
  body.editing .txt-rich:focus{outline:2px solid var(--accent);background:var(--accent-soft);}
  body.editing .navy .txt-rich:focus{background:rgba(255,255,255,0.1);}
  body.editing .txt-rich:empty::before{content:attr(data-ph);opacity:.45;pointer-events:none;}

  /* ---------- Botón flotante de símbolos/emojis ---------- */
  .fab{display:none;position:fixed;right:18px;bottom:66px;z-index:65;width:48px;height:48px;border-radius:50%;background:var(--navy-deep);color:#fff;border:none;font-size:21px;cursor:pointer;box-shadow:0 8px 22px rgba(0,0,0,0.28);align-items:center;justify-content:center;}
  body.editing .fab{display:flex;}
  .fab:hover{background:var(--navy);}
  .symbolpanel{bottom:66px;top:auto;right:76px;max-height:min(520px,70vh);}
  .sym-cat{margin-bottom:16px;}
  .sym-cat-label{display:block;font-size:10.5px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-family:'IBM Plex Mono',monospace;}
  .sym-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .sym-btn{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid transparent;border-radius:6px;background:transparent;cursor:pointer;}
  .sym-btn:hover{background:var(--accent-soft);border-color:var(--line);}
  @media(max-width:520px){
    .symbolpanel{left:10px;right:10px;width:auto;top:auto;bottom:0;max-height:72vh;border-radius:12px 12px 0 0;}
    .fab{right:14px;bottom:78px;}
  }

  /* ---------- Kit de marca ---------- */
  .brand-swatch-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .brand-swatch-row input[type="color"]{width:44px;height:36px;border:1px solid var(--line);border-radius:6px;padding:2px;background:var(--surface);cursor:pointer;}

  /* ---------- Bloque de aviso (callout) ---------- */
  .b-callout{display:flex;gap:14px;padding:20px 22px;border-radius:8px;border-left:4px solid;align-items:flex-start;}
  .b-callout .callout-icon{font-size:20px;line-height:1;flex-shrink:0;margin-top:1px;}
  .b-callout .callout-body{flex:1;min-width:0;}
  .b-callout .callout-body .txt-rich{font-size:15px;line-height:1.65;color:var(--body);}
  .b-callout.variant-info{background:rgba(46,107,166,0.07);border-left-color:var(--accent);}
  .b-callout.variant-warning{background:rgba(198,132,30,0.08);border-left-color:var(--risk-mid);}
  .b-callout.variant-success{background:rgba(46,139,87,0.08);border-left-color:var(--risk-low);}
  .b-callout.variant-danger{background:rgba(176,52,47,0.07);border-left-color:var(--risk-high);}
  .blk.navy .b-callout.variant-info{background:rgba(46,107,166,0.16);}
  .blk.navy .b-callout.variant-warning{background:rgba(198,132,30,0.18);}
  .blk.navy .b-callout.variant-success{background:rgba(46,139,87,0.18);}
  .blk.navy .b-callout.variant-danger{background:rgba(176,52,47,0.16);}
  .blk.navy .b-callout .callout-body .txt-rich{color:rgba(255,255,255,0.85);}

  /* ---------- Archivo adjunto descargable ---------- */
  .b-file-link{display:flex;align-items:center;gap:14px;padding:16px 18px;border:1px solid var(--line);border-radius:8px;background:var(--surface);text-decoration:none;color:var(--ink);transition:border-color .15s;}
  .b-file-link:hover{border-color:var(--accent);}
  .blk.navy .b-file-link{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.14);color:#fff;}
  .b-file-link .file-icon{font-size:26px;flex-shrink:0;}
  .b-file-link .file-name{flex:1;font-size:14px;font-weight:600;word-break:break-word;}
  .b-file-link .file-dl{font-size:16px;opacity:.6;flex-shrink:0;}

  /* ---------- Video incrustado por enlace (YouTube/Vimeo) ---------- */
  .b-media-embed{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;}
  .b-media-embed iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0;}

  /* ---------- Accesibilidad: alt text y transcripciones ---------- */
  .b-alt{margin-top:8px;font-size:12px;color:var(--muted);display:flex;gap:8px;align-items:baseline;}
  .b-alt .alt-label{font-family:'IBM Plex Mono',monospace;font-weight:600;flex-shrink:0;white-space:nowrap;}
  .b-alt [data-edit]{flex:1;}
  .blk.navy .b-alt{color:rgba(255,255,255,0.6);}
  .b-transcript-view{margin-top:10px;font-size:13px;color:var(--body);}
  .b-transcript-view summary{cursor:pointer;font-weight:600;color:var(--accent);font-size:12.5px;}
  .b-transcript-view .transcript-body{margin-top:8px;line-height:1.6;padding:12px 14px;background:rgba(11,31,51,0.03);border-radius:6px;}
  .blk.navy .b-transcript-view{color:rgba(255,255,255,0.75);}
  .blk.navy .b-transcript-view .transcript-body{background:rgba(255,255,255,0.06);}
  .b-explanation{margin-top:12px;font-size:12px;color:var(--muted);display:flex;gap:8px;align-items:baseline;}
  .b-explanation .alt-label{font-family:'IBM Plex Mono',monospace;font-weight:600;flex-shrink:0;white-space:nowrap;}
  .b-explanation [data-edit]{flex:1;}
  .blk.navy .b-explanation{color:rgba(255,255,255,0.6);}
  .b-explanation-view{margin-top:12px;font-size:13.5px;line-height:1.6;color:var(--body);padding:12px 14px;background:rgba(46,139,87,0.07);border-left:3px solid var(--risk-low);border-radius:0 6px 6px 0;}
  .blk.navy .b-explanation-view{color:rgba(255,255,255,0.85);background:rgba(46,139,87,0.14);}

  /* ---------- Foco visible por teclado ---------- */
  a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible,
  [tabindex]:focus-visible, [contenteditable]:focus-visible{
    outline:2px solid var(--accent); outline-offset:2px;
  }

  .lang-tag{display:inline-flex;align-items:center;font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:700;letter-spacing:.5px;color:var(--accent);background:var(--accent-soft);padding:4px 8px;border-radius:5px;}
  .blk.navy .lang-tag{background:rgba(255,255,255,0.14);color:#fff;}
  .mirror-status{display:inline-flex;align-items:center;font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-style:italic;letter-spacing:.2px;color:var(--muted);padding:6px 4px;cursor:default;user-select:none;}
  .blk.navy .mirror-status{color:rgba(255,255,255,0.55);}

  /* ---------- Toast & modal ---------- */
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 14px 11px 20px;border-radius:6px;font-size:13px;font-weight:500;z-index:90;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;box-shadow:0 8px 24px rgba(0,0,0,0.25);max-width:92vw;text-align:center;display:flex;align-items:center;gap:14px;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto;}
  .toast-action{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;padding:6px 12px;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;font-family:'IBM Plex Mono',monospace;white-space:nowrap;}
  .toast-action:hover{background:rgba(255,255,255,0.26);}
  .modal-scrim{position:fixed;inset:0;background:rgba(11,31,51,0.5);z-index:80;display:none;align-items:center;justify-content:center;padding:20px;}
  .modal-scrim.open{display:flex;animation:fadeIn .2s ease;}
  .modal{background:var(--surface);border-radius:10px;padding:28px;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3);animation:slideUp .25s ease;}
  .modal h3{font-size:17px;font-weight:600;color:var(--ink);margin-bottom:10px;}
  .modal p{font-size:14px;color:var(--body);line-height:1.6;margin-bottom:22px;}
  .modal .row{display:flex;gap:10px;justify-content:flex-end;}
  .mbtn{padding:10px 18px;border-radius:6px;font-size:12.5px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;cursor:pointer;border:1px solid var(--line);background:var(--surface);color:var(--muted);font-family:'IBM Plex Mono',monospace;}
  .mbtn.danger{background:var(--red);border-color:var(--red);color:#fff;}
  .mbtn.primary{background:var(--navy-deep);border-color:var(--navy-deep);color:#fff;}

  /* ---------- Confeti (cañón desde abajo, reutilizado por la pantalla de resultado) ---------- */
  .confetti-field{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:1;}
  .confetti-piece{position:absolute;bottom:-20px;opacity:0;animation:confetti-launch cubic-bezier(.18,.7,.32,1) forwards;}
  @keyframes confetti-launch{
    0%{transform:translateY(0) translateX(0) rotate(0deg);opacity:1;}
    45%{transform:translateY(var(--peak)) translateX(calc(var(--drift) * 0.55)) rotate(calc(var(--spin) * 0.5));opacity:1;}
    100%{transform:translateY(var(--fall)) translateX(var(--drift)) rotate(var(--spin));opacity:0;}
  }

  .viewbadge{position:fixed;left:18px;bottom:18px;z-index:50;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:8px 16px;font-size:11.5px;font-weight:600;color:var(--muted);box-shadow:0 4px 16px rgba(0,0,0,0.1);display:none;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;}
  .viewbadge.show{display:flex;}
  .viewbadge .dot{width:7px;height:7px;border-radius:50%;background:var(--risk-low);animation:fadeIn 1s ease infinite alternate;}

  footer.credit{background:var(--navy-deep);color:rgba(255,255,255,0.5);text-align:center;padding:22px;font-size:11px;font-family:'IBM Plex Mono',monospace;letter-spacing:.3px;text-transform:uppercase;}

  /* ---------- Responsive / móvil ---------- */
  @media(max-width:640px){
    section.blk{padding:56px 18px;}
    .blk h2{font-size:22px;gap:12px;margin-bottom:26px;padding-bottom:16px;}
    .b-text,.b-quiz,.b-audio{padding:20px;}
    .cta{padding:64px 20px;}
    .cta h2{font-size:23px;}
    .b-wrap{width:100% !important;margin-left:0 !important;margin-right:0 !important;}
  }
  @media(max-width:520px){
    header.appbar{padding:10px 14px;gap:8px;}
    .brand-txt span{display:none;}
    .hdr-tools{gap:6px;}
    #btnOpenMirror{padding:6px 9px;}
    #btnMenuTxt{display:none;}
    .pillgroup button{padding:6px 10px;font-size:10.5px;}
    .drawer-foot{padding:14px;}
    .stylepanel{left:10px;right:10px;width:auto;top:auto;bottom:0;max-height:72vh;border-radius:12px 12px 0 0;}
    .sp-head{border-radius:12px 12px 0 0;}
  }
</style>
</head>
<body>

<header class="appbar">
  <div class="brand">
    <div class="brand-badge" id="brandBadge" data-brand-field="badge" data-edit maxlength="4">Heli</div>
    <div class="brand-txt">
      <b id="brandTitle" data-brand-field="title" data-edit>Programa PLAFT/PADM</b>
      <span id="brandSub">Plataforma e-Learning</span>
    </div>
  </div>
  <div class="hdr-tools">
    <div class="hdr-logo-wrap">
      <div class="hdr-logo" id="hdrLogo"></div>
      <label class="hdr-logo-btn editonly" title="" id="hdrLogoUploadLbl">
        <input type="file" accept="image/*" style="display:none" onchange="onHeaderLogoPick(event)">
        <span id="hdrLogoUploadIcon">🖼</span>
      </label>
      <button class="hdr-logo-btn editonly" id="hdrLogoRemoveBtn" onclick="removeHeaderLogo()" style="display:none;" title="">✕</button>
    </div>
    <div class="pillgroup" id="langPills">
      <button id="pillEs" onclick="setLang('es')">ES</button>
      <button id="pillEn" onclick="setLang('en')">EN</button>
      <button id="btnOpenMirror" onclick="openMirror()" title="">↗</button>
    </div>
    <div class="pillgroup" id="modePills">
      <button id="pillEdit" onclick="setMode(true)"></button>
      <button id="pillView" onclick="setMode(false)"></button>
    </div>
    <button class="hbtn" onclick="toggleDrawer(true)">
      <span class="hamb"><span></span><span></span><span></span></span>
      <span id="btnMenuTxt"></span>
    </button>
  </div>
</header>

<div class="progresswrap">
  <div class="progresstrack"><div class="progressfill" id="progressFill"></div></div>
  <div class="progressmeta">
    <span id="progressLeft"></span>
    <span id="progressRight"></span>
  </div>
</div>

<main id="app"></main>

<footer class="credit" id="creditFoot"></footer>

<div class="scrim" id="scrim" onclick="toggleDrawer(false)"></div>
<aside class="drawer" id="drawer" aria-label="Índice de módulos">
  <div class="drawer-head">
    <b id="drawerTitle"></b>
    <button onclick="toggleDrawer(false)" aria-label="Cerrar">×</button>
  </div>
  <div class="drawer-body">
    <div class="sp-note" id="storageInfo" style="display:none;padding:0 2px 10px;"></div>
    <div class="sp-note" id="progressSummary" style="display:none;padding:0 2px 14px;"></div>
    <div id="drawerBody"></div>
  </div>
  <div class="drawer-foot">
    <button class="wbtn editonly" onclick="openAdminPanel()" id="btnAdminPanel"></button>
    <button class="wbtn editonly" onclick="openCertPanel()" id="btnCertPanel"></button>
    <button class="wbtn editonly" onclick="openMotivationPanel()" id="btnMotivationPanel"></button>
    <div class="drawer-section-title editonly" id="drawerSectionGeneral"></div>
    <label class="editonly" style="display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);margin-bottom:2px;cursor:pointer;">
      <input type="checkbox" id="requireIdentityChk" onchange="setRequireIdentity(this.checked)">
      <span id="requireIdentityLbl"></span>
    </label>

const params = new URLSearchParams(location.search);
var state = {
  lang: params.get('lang') === 'en' ? 'en' : 'es',
  editing: window.__ADMIN_UNLOCKED__ === true && params.get('modo') !== 'vista',
  mirror: params.get('modo') === 'vista',
  currentModule: 0,
  project: null,
  storageOk: true,
  examResultView: null
};
const t = () => UI[state.lang];
const uid = () => 'id' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
const bi = (es, en) => ({ es: es || '', en: en || '' });
/* Guarda un campo bilingüe {es,en}. Si se edita en ES y el EN todavía no fue
   modificado manualmente (está vacío o coincide con el valor anterior de ES),
   se espeja automáticamente a EN como punto de partida para traducir. */
/* Guarda un campo bilingüe {es,en}. Mientras el inglés no haya sido tocado
   a mano ni una sola vez (_enTouched), cada edición en español se espeja
   automáticamente a inglés. En el momento en que se escribe algo directamente
   en el campo de inglés, ese campo queda "tocado" y deja de recibir el espejo
   automático desde ese momento en adelante (protege la traducción manual). */
function saveBilingualField(obj, key, lang, newVal){
  if (!obj[key]) obj[key] = { es:'', en:'' };
  const field = obj[key];
  const changed = field[lang] !== newVal;
  field[lang] = newVal;
  if (lang === 'es' && !field._enTouched){
    field.en = newVal;
  } else if (lang === 'en'){
    field._enTouched = newVal.trim() !== '';
  }
  return changed;
}
const esc = (s) => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

/* ---------------- Migración: texto plano antiguo → HTML enriquecido ---------------- */
function protectDivergedTranslations(project){
  function visit(node){
    if (!node || typeof node !== 'object') return;
    if (Array.isArray(node)){ node.forEach(visit); return; }
    if (typeof node.es === 'string' && typeof node.en === 'string' && !('_enTouched' in node)){
      if (node.en && node.en !== node.es) node._enTouched = true;
    }
    Object.keys(node).forEach(k => { if (k !== '_enTouched') visit(node[k]); });
  }
  visit(project);
  return project;
}
function migrateProject(project){
  if (!project._translationsProtected){
    protectDivergedTranslations(project);
    project._translationsProtected = true;
  }
  // Migración: la "posición libre de sección entera" (versión anterior) pasa a
  // ser "posición libre por elemento", conservando las posiciones ya ajustadas.
  for (const m of project.modules){
    for (const s of m.sections){
      if (s.custom && s.custom.layout === 'free'){
        s.custom.layout = 'stack';
        delete s.custom.canvasHeight;
        for (const b of s.blocks){
          if (!b.custom) b.custom = {};
          if (!('free' in b.custom)) b.custom.free = true;
        }
      }
      // Migración: la posición vertical (y) y el alto (h) de los elementos libres
      // pasaban a ser porcentaje del área, lo que hacía que cambiar el tamaño del
      // área reescalara y superpusiera todo. Ahora son píxeles fijos e independientes.
      const refH = (s.custom && s.custom.freeCanvasHeight) || 480;
      for (const b of s.blocks){
        if (b.freePos && !b.freePos._px){
          b.freePos.y = Math.round((b.freePos.y / 100) * refH);
          b.freePos.h = Math.max(40, Math.round((b.freePos.h / 100) * refH));
          b.freePos._px = true;
        }
      }
    }
  }
  if (!project.settings) project.settings = { requireIdentity: true };
  if (project.settings.passingScore == null) project.settings.passingScore = 80;
  if (project.settings.sequentialLock == null) project.settings.sequentialLock = false;
  if (project.settings.trackingUrl == null) project.settings.trackingUrl = '';
  if (project.settings.examModuleId === undefined) project.settings.examModuleId = null;
  if (!project.settings.maxExamAttempts) project.settings.maxExamAttempts = 3;
  if (project.settings.finalModuleId === undefined) project.settings.finalModuleId = null;
  if (project.org.headerLogoMediaId === undefined) project.org.headerLogoMediaId = null;
  if (!project.completionMessages || !project.completionMessages.length){
    project.completionMessages = [
      bi('¡Felicitaciones, {nombre}! Completaste todo el curso. 🎉', 'Congratulations, {nombre}! You\u2019ve completed the whole course. 🎉'),
      bi('¡Llegaste al final! Generá tu certificado más abajo.', 'You\u2019ve reached the end! Generate your certificate below.'),
      bi('Gran trabajo, {nombre}. El curso está completo.', 'Great job, {nombre}. The course is complete.')
    ];
  }
  if (!project.trash) project.trash = [];
  if (!project.completionLog) project.completionLog = [];
  if (!project.motivationalMessages || !project.motivationalMessages.length){
    project.motivationalMessages = [
      bi('¡Excelente trabajo, {nombre}! Vas muy bien.', 'Excellent work, {nombre}! You\u2019re doing great.'),
      bi('¡Un módulo menos, {nombre}! Seguí así.', 'One more module done, {nombre}! Keep it up.'),
      bi('Bien hecho. Cada módulo te acerca al certificado.', 'Well done. Every module brings you closer to your certificate.'),
      bi('¡Felicitaciones por completar este módulo!', 'Congratulations on completing this module!'),
      bi('Gran avance, {nombre}. La constancia rinde frutos.', 'Great progress, {nombre}. Consistency pays off.'),
      bi('¡Seguí adelante! Ya estás más cerca de terminar.', 'Keep going! You\u2019re getting closer to the finish line.')
    ];
  }
  if (!project.certificate) project.certificate = { template: 'classic', signerName: bi('',''), signerTitle: bi('',''), logoMediaId: null };
  if (!project.certificate.template) project.certificate.template = 'classic';
  if (!project.certificate.signerName) project.certificate.signerName = bi('','');
  if (!project.certificate.signerTitle) project.certificate.signerTitle = bi('','');
  if (project.certificate.logoMediaId === undefined) project.certificate.logoMediaId = null;
  const looksHtml = (s) => /<[a-z][\s\S]*>/i.test(s || '');
  for (const m of project.modules){
    for (const s of m.sections){
      for (const b of s.blocks){
        if ((b.type === 'text' || b.type === 'callout') && !b._rich){
          ['es','en'].forEach(lang=>{
            const raw = b.text ? b.text[lang] : '';
            b.text = b.text || {es:'',en:''};
            b.text[lang] = looksHtml(raw) ? raw : esc(raw||'').replace(/\n/g,'<br>');
          });
          b._rich = true;
        }
        if (b.type === 'image' && !b.alt) b.alt = bi('','');
        if (b.type === 'quiz' && !b.explanation) b.explanation = bi('','');
        if (b.type === 'audio' || b.type === 'video'){
          if (!b.transcript) b.transcript = bi('','');
          if (b.mediaId == null || typeof b.mediaId === 'string'){
            b.mediaId = { es: (typeof b.mediaId === 'string' ? b.mediaId : null), en: null };
          } else {
            b.mediaId.es = b.mediaId.es || null;
            b.mediaId.en = b.mediaId.en || null;
          }
          if (b.mediaName == null || typeof b.mediaName === 'string'){
            b.mediaName = { es: (typeof b.mediaName === 'string' ? b.mediaName : null), en: null };
          } else {
            b.mediaName.es = b.mediaName.es || null;
            b.mediaName.en = b.mediaName.en || null;
          }
        }
        if (b.type === 'video'){
          if (b.videoUrl == null || typeof b.videoUrl === 'string'){
            b.videoUrl = { es: (typeof b.videoUrl === 'string' ? b.videoUrl : null), en: null };
          } else {
            b.videoUrl.es = b.videoUrl.es || null;
            b.videoUrl.en = b.videoUrl.en || null;
          }
        }
      }
    }
  }
  return project;
}

/* ---------------- Estilo por slide ---------------- */
function lighten(hex, amt){
  if (!hex) return hex;
  const h = hex.replace('#','');
  const f = h.length===3 ? h.split('').map(c=>c+c).join('') : h;
  const r = parseInt(f.slice(0,2),16), g = parseInt(f.slice(2,4),16), b = parseInt(f.slice(4,6),16);
  const mix = (c) => Math.round(c + (255-c)*amt);
  const toHex = (c) => c.toString(16).padStart(2,'0');
  return '#'+toHex(mix(r))+toHex(mix(g))+toHex(mix(b));
}
function lum(hex){
  if (!hex) return 1;
  const h = hex.replace('#','');
  const f = h.length===3 ? h.split('').map(c=>c+c).join('') : h;
  const r = parseInt(f.slice(0,2),16)/255, g = parseInt(f.slice(2,4),16)/255, b = parseInt(f.slice(4,6),16)/255;
  return 0.2126*r + 0.7152*g + 0.0722*b;
}
function getCustom(obj){ if (!obj.custom) obj.custom = {}; return obj.custom; }
/* Devuelve clase de tono de texto, css inline de fondo y tipografía de un slide */
function slideDecor(baseTheme, c){
  c = c || {};
  const type = c.bgType || 'preset';
  let bgCss = '', darkText;
  if (type === 'preset'){
    const preset = c.preset || baseTheme || 'light';
    bgCss = preset === 'navy' ? 'background:var(--navy-deep);' : 'background:var(--paper);';
    darkText = preset !== 'navy';
  } else if (type === 'color'){
    const col = c.bgColor || '#F4F7FA';
    bgCss = `background:${col};`;
    darkText = lum(col) > 0.55;
  } else if (type === 'grad'){
    const c1 = c.bgColor || '#1F4E79', c2 = c.bgColor2 || '#2E75B6', a = (c.bgAngle==null?135:c.bgAngle);
    bgCss = `background:linear-gradient(${a}deg, ${c1}, ${c2});`;
    darkText = (lum(c1)+lum(c2))/2 > 0.55;
  } else if (type === 'image'){
    bgCss = 'background:var(--navy);background-size:cover;background-position:center;';
    darkText = false;
  }
  if (c.tone === 'dark') darkText = true;
  else if (c.tone === 'light') darkText = false;
  const fontCss = c.font ? `font-family:${c.font};` : '';
  const sizeCss = (c.textSize && FONT_SIZES[c.textSize]) ? `--txt-size:${FONT_SIZES[c.textSize]}px;` : '';
  return {
    cls: darkText ? 'light' : 'navy',
    darkText,
    styleAttr: bgCss + fontCss + sizeCss,
    titleColor: c.titleColor || '',
    titleSizePx: (c.titleSize && HERO_TITLE_SIZES[c.titleSize]) ? HERO_TITLE_SIZES[c.titleSize] : null,
    titleNowrap: !!c.titleNowrap,
    isImage: type === 'image',
    imageId: type === 'image' ? (c.bgImageId || null) : null,
    overlay: (c.overlay == null ? 35 : c.overlay)
  };
}
/* Todos los ids de medios usados por el proyecto (bloques + fondos) */
function mediaIdsOf(mediaId){
  if (!mediaId) return [];
  if (typeof mediaId === 'object') return [mediaId.es, mediaId.en].filter(Boolean);
  return [mediaId];
}
function collectMediaIds(project){
  const ids = new Set();
  if (project.certificate && project.certificate.logoMediaId) ids.add(project.certificate.logoMediaId);
  if (project.org && project.org.headerLogoMediaId) ids.add(project.org.headerLogoMediaId);
  for (const m of project.modules){
    if (m.hero && m.hero.custom && m.hero.custom.bgImageId) ids.add(m.hero.custom.bgImageId);
    for (const s of m.sections){
      if (s.custom && s.custom.bgImageId) ids.add(s.custom.bgImageId);
      for (const b of s.blocks) mediaIdsOf(b.mediaId).forEach(id=>ids.add(id));
    }
  }
  return [...ids];
}

/* ---------------- IndexedDB para medios ---------------- */
let dbPromise = null;
function openDB(){
  if (dbPromise) return dbPromise;
  dbPromise = new Promise((res, rej) => {
    try {
      const rq = indexedDB.open(DB_NAME, 1);
      rq.onupgradeneeded = () => { rq.result.createObjectStore(DB_STORE); };
      rq.onsuccess = () => res(rq.result);
      rq.onerror = () => rej(rq.error);
    } catch(e){ rej(e); }
  });
  return dbPromise;
}
async function putMedia(id, blob){
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).put(blob, id);
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  });
}
async function getMedia(id){
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(DB_STORE, 'readonly');
    const rq = tx.objectStore(DB_STORE).get(id);
    rq.onsuccess = () => res(rq.result || null);
    rq.onerror = () => rej(rq.error);
  });
}
async function delMedia(id){
  try {
    const db = await openDB();
    return new Promise((res) => {
      const tx = db.transaction(DB_STORE, 'readwrite');
      tx.objectStore(DB_STORE).delete(id);
      tx.oncomplete = () => res();
      tx.onerror = () => res();
    });
  } catch(e){}
}
const mediaURL = new Map(); // id -> objectURL
async function urlFor(id){
  if (!id) return null;
  if (mediaURL.has(id)) return mediaURL.get(id);
  const blob = await getMedia(id);
  if (!blob) return null;
  const u = URL.createObjectURL(blob);
  mediaURL.set(id, u);
  return u;
}
function invalidateMedia(id){
  if (mediaURL.has(id)){ URL.revokeObjectURL(mediaURL.get(id)); mediaURL.delete(id); }
}

  try { localStorage.setItem(LEARNER_KEY, JSON.stringify(data)); } catch(e){}

function getProgress(){
  try {
    const raw = localStorage.getItem(PROGRESS_KEY);
    if (raw){
      const p = JSON.parse(raw);
      return {
        modulesVisited: p.modulesVisited||[], quizzesPassed: p.quizzesPassed||[],
        reportedAt: p.reportedAt||null, examAttempts: p.examAttempts||0, examPassed: !!p.examPassed,
        examScore: (p.examScore==null ? null : p.examScore)
      };
    }
  } catch(e){}
  return { modulesVisited: [], quizzesPassed: [], reportedAt: null, examAttempts: 0, examPassed: false, examScore: null };
}
function saveProgressData(p){ try { localStorage.setItem(PROGRESS_KEY, JSON.stringify(p)); } catch(e){} }
function markModuleVisited(moduleId){
  if (!moduleId) return;
  const p = getProgress();
  if (!p.modulesVisited.includes(moduleId)){ p.modulesVisited.push(moduleId); saveProgressData(p); }
}
function markQuizPassed(blockId){
  if (!blockId) return;
  const p = getProgress();
  if (!p.quizzesPassed.includes(blockId)){ p.quizzesPassed.push(blockId); saveProgressData(p); }
}
function allQuizBlockIds(project){
  const ids = [];
  for (const m of project.modules) for (const s of m.sections) for (const b of s.blocks) if (b.type === 'quiz') ids.push(b.id);
  return ids;
}
function courseProgressStats(project){
  const p = getProgress();
  const modTotal = project.modules.length;
  const modDone = project.modules.filter(m=>p.modulesVisited.includes(m.id)).length;
  const quizIds = allQuizBlockIds(project);
  const quizTotal = quizIds.length;
  const quizDone = quizIds.filter(id=>p.quizzesPassed.includes(id)).length;
  return { modDone, modTotal, quizDone, quizTotal };
}
function isCourseComplete(project){
  const st = courseProgressStats(project);
  const settings = project.settings || {};
  if (settings.examModuleId){
    const prog = getProgress();
    if (!prog.examPassed) return false;
  }
  return st.modDone === st.modTotal && st.quizDone === st.quizTotal;
}
function isExamModule(){
  const settings = state.project.settings || {};
  if (!settings.examModuleId) return false;
  const curModule = state.project.modules[state.currentModule];
  return !!(curModule && curModule.id === settings.examModuleId);
}
function isFinalModuleId(moduleId){
  const settings = state.project.settings || {};
  if (settings.finalModuleId) return moduleId === settings.finalModuleId;
  const mods = state.project.modules;
  return mods.length > 0 && mods[mods.length-1].id === moduleId;
}
function moduleQuizIds(mod){
  const ids = [];
  for (const s of mod.sections) for (const b of s.blocks) if (b.type === 'quiz') ids.push(b.id);
  return ids;
}
function moduleScore(project, moduleId){
  const mod = project.modules.find(m=>m.id===moduleId);
  if (!mod) return 100;
  const quizIds = moduleQuizIds(mod);
  if (!quizIds.length) return 100;
  const p = getProgress();
  const done = quizIds.filter(id=>p.quizzesPassed.includes(id)).length;
  return Math.round((done/quizIds.length)*100);
}
function isModulePassed(project, moduleId){
  const threshold = (project.settings && project.settings.passingScore) || 80;
  return moduleScore(project, moduleId) >= threshold;
}
function firstUnpassedModuleIndex(project){
  for (let i=0;i<project.modules.length;i++){
    if (!isModulePassed(project, project.modules[i].id)) return i;
  }
  return project.modules.length;
}
function isNavAllowed(project, targetIndex){
  if (state.editing) return true;
  if (!(project.settings && project.settings.sequentialLock)) return true;
  return targetIndex <= firstUnpassedModuleIndex(project);
}
function computeVerificationCode(str){
  let h = 0;
  for (let i=0;i<str.length;i++){ h = (Math.imul(31,h) + str.charCodeAt(i)) | 0; }
  return (h >>> 0).toString(36).toUpperCase().padStart(8,'0').slice(-8);
}

<script>
/* ---------------- Utilidades de edición de texto bilingüe ---------------- */
function editable(field, obj, key, ph, extraStyle){
  // field: nombre lógico para data; obj[key] = {es,en}
  const val = obj[key] ? obj[key][state.lang] : '';
  return `<span data-edit data-path="${field}" data-ph="${esc(ph)}" style="${extraStyle||''}">${esc(val)}</span>`;
}
const CE_MODE = (()=>{ try{ const d=document.createElement('div'); d.setAttribute('contenteditable','plaintext-only'); return d.contentEditable==='plaintext-only' ? 'plaintext-only' : 'true'; }catch(e){ return 'true'; } })();
function bindEditables(root, resolver){
  root.querySelectorAll('[data-edit]').forEach(el => {
    const path = el.getAttribute('data-path');
    const ph = el.getAttribute('data-ph') || '';
    if (state.editing){
      el.setAttribute('contenteditable', CE_MODE);
      el.setAttribute('spellcheck', 'false');
      el.setAttribute('autocapitalize', 'off');
      if (!el.textContent.trim()){ el.textContent = ''; el.setAttribute('data-empty','1'); el.textContent=''; }
      if (!el.textContent.trim()) el.innerHTML = `<span style="opacity:.45;pointer-events:none;">${esc(ph)}</span>`;
      el.addEventListener('focus', () => {
        if (el.querySelector('span')) el.textContent = '';
      });
      el.addEventListener('blur', () => {
        const target = resolver(path);
        if (!target) return;
        const txt = el.textContent.replace(/\u00a0/g,' ').trim();
        if (saveBilingualField(target.obj, target.key, state.lang, txt)){
          saveProject(true);
          toast(t().savedToast);
        }
        if (!txt) el.innerHTML = `<span style="opacity:.45;pointer-events:none;">${esc(ph)}</span>`;
      });
      el.addEventListener('keydown', (ev)=>{
        if (ev.key === 'Enter' && !el.hasAttribute('data-multiline')){ ev.preventDefault(); el.blur(); }
      });
    } else {
      el.removeAttribute('contenteditable');
      if (!el.textContent.trim()) el.closest('[data-hide-empty]')?.style.setProperty('display','none');
    }
  });
}

    document.getElementById('lblGlobalFont').textContent = t().globalFont;
    gf.innerHTML = FONTS.map(f=>`<option value="${esc(f[0])}">${esc(f[1])}</option>`).join('');
    gf.value = state.project.org.font || FONTS[0][0];
    if (gf.selectedIndex < 0) gf.selectedIndex = 0;
  }
}

function renderModule(){
  const app = document.getElementById('app');
  const mods = state.project.modules;
  if (state.currentModule >= mods.length) state.currentModule = mods.length-1;
  if (state.currentModule < 0) state.currentModule = 0;
  const m = mods[state.currentModule];
  const idx = state.currentModule;
  if (!state.editing){ markModuleVisited(m.id); maybeReportCompletion(); }
  persistLastModule();

  if (state.examResultView){
    app.innerHTML = renderExamResultScreen(m, state.examResultView);
    requestAnimationFrame(()=>{
      setupReveals();
      if (state.examResultView && state.examResultView.passed){
        startConfettiLoop(document.getElementById('confettiFieldInline'));
        const screenEl = document.querySelector('.exam-result-screen');
        if (screenEl) screenEl.addEventListener('click', stopConfettiLoop, { once: true });
      } else {
        stopConfettiLoop();
      }
      hydrateExamResultLogo();
    });
    return;
  }

  let html = '';

  /* ----- HERO ----- */
  const hd = slideDecor('navy', m.hero.custom);
  const heroAlign = (m.hero.custom && m.hero.custom.align) === 'left' ? 'text-align:left;' : '';
  const heroInnerAlign = (m.hero.custom && m.hero.custom.align) === 'left' ? 'margin:0;' : '';
  html += `
  <section class="hero ${hd.darkText?'darktext':''}" data-marker="hero" style="${hd.styleAttr}${heroAlign}" ${hd.isImage&&hd.imageId?`data-bg-media="${hd.imageId}" data-overlay="${hd.overlay}"`:''}>
    <div class="regmarks"><i></i><i></i><i></i><i></i></div>
    <div class="hero-inner" style="${heroInnerAlign}">
      <div class="tag">${editable('org.tag', state.project.org, 'tag', t().heroTagPh)}</div>
      <div class="modlabel">${esc(t().modLabel(idx+1))}</div>
      <h1 style="${hd.titleColor?`color:${esc(hd.titleColor)};`:''}${hd.titleSizePx?`font-size:${hd.titleSizePx}px;`:''}${hd.titleNowrap?'white-space:nowrap;overflow:hidden;text-overflow:ellipsis;':''}">${editable('hero.title', m.hero, 'title', t().heroTitlePh)}</h1>
      <p class="sub"><span data-edit data-multiline data-path="hero.subtitle" data-ph="${esc(t().heroSubPh)}">${esc(m.hero.subtitle[state.lang])}</span></p>
      <div class="stats" style="${(m.hero.custom&&m.hero.custom.align)==='left'?'justify-content:flex-start;':''}">
        ${m.hero.stats.map((s,i)=>`<span>${editable('hero.stat.'+i, {v:s}, 'v', t().statPh)}</span>`).join('')}
      </div>
      <div class="etools editonly" style="justify-content:${(m.hero.custom&&m.hero.custom.align)==='left'?'flex-start':'center'};margin-top:26px;">
        <button class="ebtn" onclick="openStylePanel('hero','${m.id}')">${esc(t().style)}</button>
      </div>
    </div>
  </section>`;

  /* ----- AVISO DEL EXAMEN (visible desde el principio, no solo al final) ----- */
  if (!state.editing && isExamModule() && !(getProgress().examPassed)){
    const attemptsLeftTop = Math.max(0, (state.project.settings.maxExamAttempts||3) - (getProgress().examAttempts||0));
    html += `<div class="exam-info-banner exam-info-banner-top">
      <div class="exam-info-item"><span class="exam-info-lbl">${esc(t().examInfoPassing)}</span><span class="exam-info-val">${state.project.settings.passingScore||80}%</span></div>
      <div class="exam-info-item"><span class="exam-info-lbl">${esc(t().examInfoAttempts)}</span><span class="exam-info-val">${attemptsLeftTop} / ${state.project.settings.maxExamAttempts||3}</span></div>
    </div>`;
  }

  /* ----- SECCIONES ----- */
  m.sections.forEach((sec, si) => {
    html += renderSection(m, sec, si);
  });

  /* ----- Agregar sección ----- */
  html += `
  <div class="addsec editonly" style="background:${'var(--paper)'};">
    <button class="ebtn" onclick="addSection('light')">${esc(t().addSectionLight)}</button>
    <button class="ebtn" onclick="addSection('navy')">${esc(t().addSectionNavy)}</button>
  </div>`;

  /* ----- CTA ----- */
  const hasPrev = idx > 0, hasNext = idx < mods.length-1;
  const navBlocked = hasNext && !isNavAllowed(state.project, idx+1);
  const examActive = !state.editing && isExamModule();
  const examProg = examActive ? getProgress() : null;
  const examPassedAlready = !!(examProg && examProg.examPassed);
  const examAttemptsLeft = examProg ? Math.max(0, (state.project.settings.maxExamAttempts||3) - (examProg.examAttempts||0)) : 0;
  const examPending = examActive && !examPassedAlready;
  const isFinal = isFinalModuleId(m.id);
  const showCert = !state.editing && isFinal && !examPending;
  const courseDone = showCert && isCourseComplete(state.project);
  const motivationHtml = (!state.editing) ? renderMotivationalMessage(isFinal) : '';
  const missingDetail = (showCert && !courseDone) ? courseProgressStats(state.project) : null;
  const examAttemptsNote = examPending ? `<div class="exam-info-banner">
    <div class="exam-info-item"><span class="exam-info-lbl">${esc(t().examInfoPassing)}</span><span class="exam-info-val">${state.project.settings.passingScore||80}%</span></div>
    <div class="exam-info-item"><span class="exam-info-lbl">${esc(t().examInfoAttempts)}</span><span class="exam-info-val">${examAttemptsLeft} / ${state.project.settings.maxExamAttempts||3}</span></div>
  </div>` : '';
  const ctaBodyText = isFinal ? t().ctaTextFinal : t().ctaText;
  html += `
  <section class="cta">
    <div class="regmarks"><i></i><i></i><i></i><i></i></div>
    <div class="blk-inner">
      <h2>${esc(isFinal ? t().ctaTitleFinal : t().ctaTitle)}</h2>
      <p>${esc(ctaBodyText)}</p>
      ${motivationHtml}
      <div class="btns">
        <button class="cbtn" ${hasPrev?'':'disabled'} onclick="gotoModule(${idx-1})">${esc(t().back)}</button>
        ${examPending
          ? `<button class="cbtn primary" onclick="submitExam()">${esc(t().submitExamBtn)}</button>`
          : (hasNext ? `<button class="cbtn primary" ${!navBlocked?'':'disabled'} onclick="gotoModule(${idx+1})">${esc(t().next)}</button>` : '')}
      </div>
      ${examAttemptsNote}
      ${navBlocked ? `<div style="margin-top:12px;font-size:12px;color:rgba(255,255,255,0.6);">${esc(t().moduleLocked)}</div>` : ''}
      ${showCert ? `<div style="margin-top:22px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
        <button class="cbtn primary" ${courseDone?'':'disabled'} onclick="generateCertificate()">${esc(t().certBtn)}</button>
        ${courseDone ? `<button class="cbtn" onclick="exportResult()">${esc(t().exportResultBtn)}</button>` : ''}
        ${courseDone ? `<button class="cbtn" onclick="exportResultPdf()">${esc(t().exportResultPdfBtn)}</button>` : ''}
        ${(courseDone && examActive) ? `<button class="cbtn" onclick="exportExamReviewPdf()">${esc(t().examReviewBtn)}</button>` : ''}
        ${!courseDone ? `<div style="margin-top:12px;font-size:12px;color:rgba(255,255,255,0.6);width:100%;">${esc(t().certNeedMore)}<br>${esc(t().progressSummary(missingDetail.modDone, missingDetail.modTotal, missingDetail.quizDone, missingDetail.quizTotal))}</div>` : ''}
      </div>` : ''}
    </div>
  </section>`;

  app.innerHTML = html;

  /* resolver de rutas de edición */
  bindEditables(app, (path) => {
    if (!path) return null;
    if (path === 'org.tag') return { obj: state.project.org, key:'tag' };
    if (path === 'hero.title') return { obj: m.hero, key:'title' };
    if (path === 'hero.subtitle') return { obj: m.hero, key:'subtitle' };
    if (path.startsWith('hero.stat.')){
      const i = +path.split('.')[2];
      return { obj: { v: m.hero.stats[i] }, key: 'v' }; // obj.v referencia el {es,en} original
    }
    return null;
  });

  /* bindings de secciones y bloques */
  m.sections.forEach(sec => bindSection(m, sec));
  bindRichText(app);
  hydrateMedia();
}

function renderSection(m, sec, si){
  const d = slideDecor(sec.theme, sec.custom);
  const theme = d.cls; // clase de tono de texto (light = texto oscuro, navy = texto claro)
  const layout = (sec.custom && sec.custom.layout) || 'stack';
  let inner = '';

  const hasSubtitle = sec.subtitle && (sec.subtitle.es || sec.subtitle.en || state.editing);
  const subtitleBtn = sec.subtitle
    ? `<button class="ebtn" onclick="removeSectionSubtitle('${sec.id}')">${esc(t().removeSubtitleLbl)}</button>`
    : `<button class="ebtn" onclick="addSectionSubtitle('${sec.id}')">${esc(t().addSubtitleLbl)}</button>`;

  inner += `
  <div class="secbar editonly">
    <span class="lbl">${esc(t().secBar)} ${si+1}</span>
    <span class="grp">
      <button class="ebtn" onclick="moveSection('${sec.id}',-1)" title="${esc(t().up)}">${t().up}</button>
      <button class="ebtn" onclick="moveSection('${sec.id}',1)" title="${esc(t().down)}">${t().down}</button>
      <button class="ebtn" onclick="openStylePanel('sec','${sec.id}')">${esc(t().style)}</button>
      ${subtitleBtn}
      <button class="ebtn" onclick="duplicateSection('${sec.id}')">${esc(t().dup)}</button>
      <button class="ebtn danger" onclick="askDelSection('${sec.id}')">${esc(t().delSection)}</button>
    </span>
  </div>`;

  const secTitleSizePx = (sec.custom && sec.custom.titleSize && SEC_TITLE_SIZES[sec.custom.titleSize]) ? SEC_TITLE_SIZES[sec.custom.titleSize] : null;
  const secTitleNowrap = !!(sec.custom && sec.custom.titleNowrap);
  const h2Style = `${d.titleColor?`color:${esc(d.titleColor)};`:''}${secTitleSizePx?`font-size:${secTitleSizePx}px;`:''}${secTitleNowrap?'white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;':''}`;
  inner += `<h2 class="reveal" ${h2Style?`style="${h2Style}"`:''}><span class="eyebrow mono">${String(si+1).padStart(2,'0')}</span><span data-edit data-sec="${sec.id}" data-field="title" data-ph="${esc(t().secTitlePh)}">${esc(sec.title[state.lang])}</span></h2>`;

  if (hasSubtitle){
    inner += `<div class="sec-subtitle reveal"><span data-edit data-multiline data-sec="${sec.id}" data-field="subtitle" data-ph="${esc(t().subtitlePh)}">${esc(sec.subtitle?sec.subtitle[state.lang]:'')}</span></div>`;
  }

  // separar bloques con posición libre (overlay individual) de los que siguen el flujo normal
  const flowBlocks = [], freeBlocks = [];
  sec.blocks.forEach((b) => (getCustom(b).free ? freeBlocks : flowBlocks).push(b));
  const flowHtml = flowBlocks.map((b) => wrapBlockSpacing(b, renderBlock(sec, b, sec.blocks.indexOf(b)), layout));

  // los bloques marcados "abarcar ancho completo" cortan el flujo en tramos;
  // cada tramo mantiene la disposición elegida (2 columnas, split, angosta, etc.)
  const segments = [];
  let runBlocks = [], runHtml = [];
  flowBlocks.forEach((b, i) => {
    if (getCustom(b).spanFull){
      if (runBlocks.length){ segments.push({ type:'run', blocks:runBlocks, html:runHtml }); runBlocks=[]; runHtml=[]; }
      segments.push({ type:'span', html: flowHtml[i] });
    } else {
      runBlocks.push(b); runHtml.push(flowHtml[i]);
    }
  });
  if (runBlocks.length) segments.push({ type:'run', blocks:runBlocks, html:runHtml });

  segments.forEach(seg => {
    if (seg.type === 'span'){ inner += seg.html; return; }
    const runBlocksArr = seg.blocks, runHtmlArr = seg.html;
    if (layout === 'cols2'){
      inner += `<div class="blkgrid cols2">${runHtmlArr.join('')}</div>`;
    } else if (layout === 'splitR' || layout === 'splitL'){
      const isMedia = (b)=> b.type==='image' || b.type==='video' || b.type==='audio';
      const textCol = [], mediaCol = [];
      runBlocksArr.forEach((b,i)=> (isMedia(b)?mediaCol:textCol).push(runHtmlArr[i]));
      if (!textCol.length || !mediaCol.length){
        inner += runHtmlArr.join('');
      } else {
        inner += `<div class="blkgrid split ${layout==='splitL'?'rev':''}">
          <div class="col">${textCol.join('')}</div>
          <div class="col">${mediaCol.join('')}</div>
        </div>`;
      }
    } else if (layout === 'narrow'){
      inner += `<div class="blknarrow">${runHtmlArr.join('')}</div>`;
    } else {
      inner += runHtmlArr.join('');
    }
  });

  let freeItemsHtml = '';
  let freeControlsHtml = '';
  if (freeBlocks.length){
    freeItemsHtml = freeBlocks.map((b)=>freeWrapBlock(sec,b,renderBlock(sec,b,sec.blocks.indexOf(b)))).join('');
    if (state.editing){
      freeControlsHtml = `<div class="free-canvas-resize" title="${esc(t().freeCanvasResizeHint)}" onmousedown="startFreeCanvasResize(event,'${sec.id}')">
        <span>⋯ ${esc(t().freeCanvasResizeHint)}</span>
        <button class="ebtn" onmousedown="event.stopPropagation()" onclick="autoFitFreeCanvas('${sec.id}')">${esc(t().freeAutoFitLbl)}</button>
      </div>`;
    }
  }

  inner += `
  <div class="addbar editonly">
    <button class="ebtn" onclick="addBlock('${sec.id}','text')">${esc(t().addText)}</button>
    <button class="ebtn" onclick="addBlock('${sec.id}','callout')">${esc(t().addCallout)}</button>
    <button class="ebtn" onclick="addBlock('${sec.id}','image')">${esc(t().addImage)}</button>
    <button class="ebtn" onclick="addBlock('${sec.id}','video')">${esc(t().addVideo)}</button>
    <button class="ebtn" onclick="addBlock('${sec.id}','audio')">${esc(t().addAudio)}</button>
    <button class="ebtn" onclick="addBlock('${sec.id}','file')">${esc(t().addFile)}</button>
    <button class="ebtn" onclick="addBlock('${sec.id}','quiz')">${esc(t().addQuiz)}</button>
    <button class="ebtn" onclick="addTrueFalse('${sec.id}')">${esc(t().addTrueFalseLbl)}</button>
    <button class="ebtn" onclick="addMultiChoice('${sec.id}')">${esc(t().addMultiLbl)}</button>
  </div>`;

  const freeMinH = freeBlocks.length ? ((sec.custom && sec.custom.freeCanvasHeight) || 480) : 0;
  return `<section class="blk ${theme}" data-marker="${esc(sec.id)}" style="${d.styleAttr}" ${d.isImage&&d.imageId?`data-bg-media="${d.imageId}" data-overlay="${d.overlay}"`:''}>
    <div class="blk-inner" ${freeBlocks.length?`data-canvas="${sec.id}"`:''} style="position:relative;${freeMinH?`min-height:${freeMinH}px;`:''}">${inner}${freeItemsHtml}${freeControlsHtml}</div>
  </section>`;
}

function wrapBlockSpacing(b, html, layout){
  const c = getCustom(b);
  const spacing = c.spacing || 'normal';
  const px = { compact:8, normal:22, wide:48, xwide:80 }[spacing] || 22;
  const width = c.width || 100;
  const align = c.align || 'left';
  const ml = (align==='center'||align==='right') ? 'auto' : '0';
  const mr = (align==='center'||align==='left') ? 'auto' : '0';
  return `<div class="block-spacer" style="margin-bottom:${px}px;width:${width}%;margin-left:${ml};margin-right:${mr};">${html}</div>`;
}
function freeWrapBlock(sec, b, innerHtml){
  if (!b.freePos) b.freePos = { x: 6, y: 20, w: 42, h: 200, _px: true };
  const p = b.freePos;
  const style = `position:absolute;left:${p.x}%;top:${p.y}px;width:${p.w}%;height:${p.h}px;`;
  const handles = state.editing ? `
    <div class="free-handle move" title="${esc(t().freeDragHint)}" onmousedown="startFreeDrag(event,'${sec.id}','${b.id}','move')">⣿</div>
    <div class="free-handle resize" title="${esc(t().freeResizeHint)}" onmousedown="startFreeDrag(event,'${sec.id}','${b.id}','resize')">↘</div>` : '';
  return `<div class="free-item" data-free-item="${b.id}" style="${style}">${handles}<div class="free-item-inner">${innerHtml}</div></div>`;
}

function blockTools(sec, b, extra){
  const c = getCustom(b);
  const spacing = c.spacing || 'normal';
  const spacingLabel = { compact:t().spacingCompact, normal:t().spacingNormal, wide:t().spacingWide, xwide:t().spacingXWide }[spacing];
  const isFree = !!c.free;
  // La posición libre queda solo disponible para "salir" de un bloque que ya la tenía activada
  // (no se ofrece como punto de entrada nuevo: causaba saltos de posición no resueltos).
  const freeBtn = isFree ? `<button class="ebtn" onclick="toggleBlockFree('${sec.id}','${b.id}')">${esc(t().freeOffLbl)}</button>` : '';
  const moveBtns = isFree ? '' : `
    <button class="ebtn" onclick="moveBlock('${sec.id}','${b.id}',-1)">${t().up}</button>
    <button class="ebtn" onclick="moveBlock('${sec.id}','${b.id}',1)">${t().down}</button>`;
  const width = c.width || 100;
  const align = c.align || 'left';
  const alignLabel = { left:t().alignLeftShort, center:t().alignCenterShort, right:t().alignRightShort }[align];
  const spanBtn = !isFree ? `<button class="ebtn" onclick="toggleSpanFull('${sec.id}','${b.id}')">${c.spanFull?esc(t().spanFullOffLbl):esc(t().spanFullOnLbl)}</button>` : '';
  const sizeControls = isFree ? '' : `
    <span class="size-slider-wrap" title="${esc(t().widthSliderHint)}">
      <span class="size-slider-lbl">${esc(t().widthSliderLbl)}</span>
      <input type="range" min="20" max="100" step="5" value="${width}" class="size-slider"
        oninput="this.nextElementSibling.textContent=this.value+'%';liveResizeBlock('${sec.id}','${b.id}',this.value)"
        onchange="commitBlockWidth('${sec.id}','${b.id}',this.value)">
      <span class="size-slider-val">${width}%</span>
    </span>
    <button class="ebtn" onclick="cycleBlockAlign('${sec.id}','${b.id}')">${esc(t().btnAlign(alignLabel))}</button>
    ${spanBtn}`;
  return `<div class="etools editonly">
    ${moveBtns}
    ${extra||''}
    ${sizeControls}
    ${!isFree ? `<button class="ebtn" onclick="cycleBlockSpacing('${sec.id}','${b.id}')">${esc(t().spacingLbl(spacingLabel))}</button>` : ''}
    ${freeBtn}
    <button class="ebtn" onclick="duplicateBlock('${sec.id}','${b.id}')">${esc(t().dup)}</button>
    <button class="ebtn danger" onclick="askDelBlock('${sec.id}','${b.id}')">${esc(t().del)}</button>
  </div>`;
}

function textBlockTools(sec, b){
  const c = getCustom(b);
  const sizeLabel = c.fontSize ? {sm:t().fsSm,md:t().fsMd,lg:t().fsLg,xl:t().fsXl}[c.fontSize] : t().fsAuto;

  return `

    ${mirrorBtn}`;
}

function renderMotivationalMessage(isFinal){
  const messages = isFinal
    ? (state.project.completionMessages || [])
    : (state.project.motivationalMessages || []);
  if (!messages.length) return '';
  const learner = getLearnerIdentity();
  const firstName = (learner && learner.name) ? learner.name.trim().split(/\s+/)[0] : '';
  let pool = messages;
  if (!firstName) pool = messages.filter(m => !((m[state.lang]||'').includes('{nombre}')));
  if (!pool.length) pool = messages;
  const idx = Math.floor(Math.random() * pool.length);
  const raw = (pool[idx] && pool[idx][state.lang]) || '';
  if (!raw) return '';
  const txt = raw.split('{nombre}').join(firstName).replace(/\s{2,}/g,' ').trim();
  if (!txt) return '';
  return `<p class="cta-motivation">${esc(txt)}</p>`;
}

      ${hasLogo ? `<div class="exam-screen-logo" id="examScreenLogo"></div>` : ''}
      <div class="exam-screen-icon">${passed?'🎉':'📋'}</div>
      <h2>${esc(passed ? t().examPassedTitle : t().examFailedTitle)}</h2>
      <div class="exam-screen-score">${pct}%</div>
      <p>${esc(passed ? t().examPassedBody : t().examFailedBody)}</p>
      ${!passed ? `<div class="exam-info-banner">
        <div class="exam-info-item"><span class="exam-info-lbl">${esc(t().examInfoPassing)}</span><span class="exam-info-val">${state.project.settings.passingScore||80}%</span></div>
        <div class="exam-info-item"><span class="exam-info-lbl">${esc(t().examInfoAttempts)}</span><span class="exam-info-val">${outOfAttempts?0:attemptsLeft} / ${maxAttempts}</span></div>
      </div>` : ''}
      ${(!passed && outOfAttempts) ? `<div style="margin-top:6px;font-size:13px;color:rgba(255,255,255,0.75);max-width:480px;margin-left:auto;margin-right:auto;">${esc(t().examOutOfAttempts)}</div>` : ''}
      <div class="btns" style="margin-top:24px;">
        ${!passed ? `<button class="cbtn primary" onclick="retryExamFromResultScreen()">${esc(outOfAttempts ? t().examResultBackToStart : t().examResultRetryBtn)}</button>` : ''}
