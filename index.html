function renderQuizExplanation(sec, b, showToLearner){
  if (!b.explanation) b.explanation = bi('','');
  if (state.editing){
    return `<div class="b-explanation editonly">
      <span class="alt-label">${esc(t().explanationLbl)}</span>
      <span data-edit data-multiline data-sec="${sec.id}" data-blk="${b.id}" data-field="explanation" data-ph="${esc(t().explanationPh)}">${esc(b.explanation[state.lang]||'')}</span>
    </div>`;
  }
  const txt = b.explanation[state.lang];
  if (showToLearner && txt){
    return `<div class="b-explanation-view">${esc(txt)}</div>`;
  }
  return '';
}

function renderBlock(sec, b, i){
  const rid = `rv-${b.id}`;
  if (b.type === 'text'){
    const c = getCustom(b);
    const align = c.align || 'left';
    const fsPx = c.fontSize && FONT_SIZES[c.fontSize] ? FONT_SIZES[c.fontSize] : null;
    const txtStyle = `text-align:${align};${fsPx?`font-size:${fsPx}px;`:''}`;
    const rtId = `rt-${b.id}`;
    return `<div class="b-wrap reveal" id="${rid}">
      <div class="b-text">
        ${state.editing ? richToolbar(rtId) : ''}
        <div class="txt txt-rich" id="${rtId}" data-sec="${sec.id}" data-blk="${b.id}" data-ph="${esc(t().textPh)}" style="${txtStyle}" ${state.editing?'contenteditable="true" spellcheck="false" autocapitalize="off"':''}>${b.text[state.lang] || ''}</div>
      </div>
      ${blockTools(sec,b, textBlockTools(sec,b))}
    </div>`;
  }
  if (b.type === 'callout'){
    const variant = b.variant || 'info';
    const icons = { info:'ℹ️', warning:'⚠️', success:'✅', danger:'⛔' };
    const rtId = `rt-${b.id}`;
    const variantLabel = { info:t().calloutInfo, warning:t().calloutWarning, success:t().calloutSuccess, danger:t().calloutDanger }[variant];
    const calloutLocked = !!(b.text && b.text._enTouched);
    const calloutMirrorBtn = calloutLocked
      ? `<button class="ebtn" title="${esc(t().mirrorLockedHint)}" onclick="unlockMirror('${sec.id}','${b.id}')">${esc(t().mirrorLocked)}</button>`
      : `<span class="mirror-status" title="${esc(t().mirrorAutoHint)}">${esc(t().mirrorAuto)}</span>`;
    return `<div class="b-wrap reveal" id="${rid}">
      <div class="b-callout variant-${variant}">
        <div class="callout-icon">${icons[variant]||icons.info}</div>
        <div class="callout-body">
          ${state.editing ? richToolbar(rtId) : ''}
          <div class="txt txt-rich" id="${rtId}" data-sec="${sec.id}" data-blk="${b.id}" data-ph="${esc(t().calloutPh)}" ${state.editing?'contenteditable="true" spellcheck="false" autocapitalize="off"':''}>${b.text[state.lang] || ''}</div>
        </div>
      </div>
      ${blockTools(sec,b, `<button class="ebtn" onclick="cycleCalloutVariant('${sec.id}','${b.id}')">${esc(t().btnVariant(variantLabel))}</button>${calloutMirrorBtn}`)}
    </div>`;
  }
  if (b.type === 'image' || b.type === 'video' || b.type === 'audio' || b.type === 'file'){
    const kind = b.type;
    const isBiMedia = (kind === 'audio' || kind === 'video');
    const curMediaId = isBiMedia ? (b.mediaId && b.mediaId[state.lang]) : b.mediaId;
    const curVideoUrl = (kind === 'video') ? (b.videoUrl && b.videoUrl[state.lang]) : null;
    const upLabel = kind==='image'?t().upImage:kind==='video'?t().upVideo:kind==='audio'?t().upAudio:t().upFile;
    const emptyMsg = kind==='image'?t().emptyImage:kind==='video'?t().emptyVideo:kind==='audio'?t().emptyAudio:t().emptyFile;
    const accept = kind==='image'?'image/*':kind==='video'?'video/*':kind==='audio'?'audio/*':'';
    let holder;
    if (kind === 'video' && curVideoUrl){
      const embed = toEmbedUrl(curVideoUrl);
      holder = embed
        ? `<div class="b-media b-media-embed"><iframe src="${esc(embed)}" allowfullscreen loading="lazy" title="video"></iframe></div>`
        : `<div class="b-empty">${esc(t().videoUrlInvalid)}</div>`;
    } else {
      holder = curMediaId
        ? `<div class="b-media" data-media-holder="${b.id}" data-kind="${kind}"></div>`
        : `<div class="b-empty">${esc(emptyMsg)}</div>`;
    }
    const capField = `<div class="b-caption" data-hide-empty><span data-edit data-sec="${sec.id}" data-blk="${b.id}" data-field="caption" data-ph="${esc(t().captionPh)}">${esc(b.caption?b.caption[state.lang]:'')}</span></div>`;
    const altField = (kind==='image' && state.editing) ? `<div class="b-alt editonly">
      <span class="alt-label">${esc(t().altLbl)}</span>
      <span data-edit data-sec="${sec.id}" data-blk="${b.id}" data-field="alt" data-ph="${esc(t().altPh)}">${esc(b.alt?b.alt[state.lang]:'')}</span>
    </div>` : '';
    const transcriptEdit = ((kind==='audio'||kind==='video') && state.editing) ? `<div class="b-alt editonly">
      <span class="alt-label">${esc(t().transcriptLbl)}</span>
      <span data-edit data-multiline data-sec="${sec.id}" data-blk="${b.id}" data-field="transcript" data-ph="${esc(t().transcriptPh)}">${esc(b.transcript?b.transcript[state.lang]:'')}</span>
    </div>` : '';
    const transcriptTxt = (kind==='audio'||kind==='video') && b.transcript && b.transcript[state.lang] ? b.transcript[state.lang] : '';
    const transcriptView = (!state.editing && transcriptTxt) ? `<details class="b-transcript-view">
      <summary>${esc(t().transcriptShow)}</summary>
      <div class="transcript-body">${esc(transcriptTxt).replace(/\n/g,'<br>')}</div>
    </details>` : '';
    const audioWrap = kind==='audio' && curMediaId
      ? `<div class="b-audio" data-media-holder="${b.id}" data-kind="audio"></div>`
      : null;
    const langTag = (isBiMedia && state.editing) ? `<span class="lang-tag" title="${esc(t().langTagNote(state.lang.toUpperCase()))}">${state.lang.toUpperCase()}</span>` : '';
    const uploadBtn = (kind==='video' && curVideoUrl) ? '' : `<label class="ebtn" style="cursor:pointer;">${esc(curMediaId?t().replace:upLabel)}<input type="file" ${accept?`accept="${accept}"`:''} style="display:none" onchange="onMediaPick(event,'${sec.id}','${b.id}')"></label>`;
    const videoUrlBtn = kind==='video' ? `<button class="ebtn" onclick="setVideoUrl('${sec.id}','${b.id}')">${esc(curVideoUrl?t().videoUrlChange:t().videoUrlAdd)}</button>` : '';
    const fitBtn = (kind==='image' && curMediaId) ? `<button class="ebtn" onclick="cycleImageFit('${sec.id}','${b.id}')">${esc(t().imageFitLbl((getCustom(b).fit==='contain')?t().imageFitContain:t().imageFitCover))}</button>` : '';
    return `<div class="b-wrap reveal" id="${rid}">
      ${kind==='audio' ? (audioWrap || holder) : holder}
      ${capField}
      ${altField}
      ${transcriptEdit}
      ${transcriptView}
      ${blockTools(sec,b, langTag + uploadBtn + videoUrlBtn + fitBtn)}
    </div>`;
  }
  if (b.type === 'quiz'){
    const mode = b.mode || 'single';
    const questionHtml = `<div class="q"><span data-edit data-sec="${sec.id}" data-blk="${b.id}" data-field="question" data-ph="${esc(t().qPh)}">${esc(b.question[state.lang])}</span></div>`;

    if (mode === 'multi'){
      const sel = b._selMulti || [];
      const opts = b.options.map((o)=>{
        const checked = sel.includes(o.id);
        let selCls = '';
        if (b._verified){
          if (checked && o.correct) selCls = 'sel-ok';
          else if (checked && !o.correct) selCls = 'sel-bad';
          else if (!checked && o.correct) selCls = 'sel-bad';
        }
        const corrTag = state.editing && o.correct ? ` <span style="font-size:11px;font-weight:800;color:#2e8b57;">${esc(t().correctTag)}</span>` : '';
        const optTools = state.editing ? `
          <span class="grp" style="display:flex;gap:4px;margin-left:auto;">
            <button class="ibtn" title="${esc(t().markCorrect)}" onclick="event.stopPropagation();toggleCorrectMulti('${sec.id}','${b.id}','${o.id}')">✓</button>
            <button class="ibtn danger" title="${esc(t().del)}" onclick="event.stopPropagation();delOption('${sec.id}','${b.id}','${o.id}')">×</button>
          </span>` : '';
        return `<div class="opt ${selCls}" role="checkbox" aria-checked="${checked}" tabindex="0" onclick="${state.editing?'':`toggleMultiOption('${sec.id}','${b.id}','${o.id}')`}" onkeydown="if((event.key==='Enter'||event.key===' ')&&!document.body.classList.contains('editing')){event.preventDefault();toggleMultiOption('${sec.id}','${b.id}','${o.id}');}">
          <span class="dot sq ${checked?'on':''}"></span>
          <span style="flex:1;"><span data-edit data-sec="${sec.id}" data-blk="${b.id}" data-field="opt:${o.id}" data-ph="${esc(t().optPh)}" onclick="if(document.body.classList.contains('editing'))event.stopPropagation();">${esc(o.text[state.lang])}</span>${corrTag}</span>
          ${optTools}
        </div>`;
      }).join('');
      let fb = '';
      if (b._verified) fb = b._allCorrect ? `<div class="fb ok">${esc(t().fbMultiOk)}</div>` : `<div class="fb bad">${esc(t().fbMultiBad)}</div>`;
      const explHtml = renderQuizExplanation(sec, b, b._verified && b._allCorrect);
      const inExam = !state.editing && isExamModule();
      return `<div class="b-wrap reveal" id="${rid}">
        <div class="b-quiz">
          ${questionHtml}
          <div role="group" aria-label="${esc(b.question[state.lang]||'')}">${opts}</div>
          ${inExam ? '' : fb}
          ${inExam ? '' : explHtml}
          <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;">
            ${(!state.editing && !inExam) ? `<button class="ebtn" onclick="verifyMulti('${sec.id}','${b.id}')">${esc(t().verifyBtn)}</button>` : ''}
            <button class="ebtn editonly" onclick="addOption('${sec.id}','${b.id}')">${esc(t().addOpt)}</button>
          </div>
        </div>
        ${blockTools(sec,b)}
      </div>`;
    }

    // modo single (default, incluye Verdadero/Falso)
    const inExamSingle = !state.editing && isExamModule();
    const opts = b.options.map((o)=>{
      const selCls = b._sel===o.id ? (inExamSingle ? 'sel-chosen' : (o.correct?'sel-ok':'sel-bad')) : '';
      const corrTag = state.editing && o.correct ? ` <span style="font-size:11px;font-weight:800;color:#2e8b57;">${esc(t().correctTag)}</span>` : '';
      const optTools = state.editing ? `
        <span class="grp" style="display:flex;gap:4px;margin-left:auto;">
          <button class="ibtn" title="${esc(t().markCorrect)}" onclick="event.stopPropagation();setCorrect('${sec.id}','${b.id}','${o.id}')">✓</button>
          <button class="ibtn danger" title="${esc(t().del)}" onclick="event.stopPropagation();delOption('${sec.id}','${b.id}','${o.id}')">×</button>
        </span>` : '';
      return `<div class="opt ${selCls}" role="radio" aria-checked="${b._sel===o.id}" tabindex="0" onclick="pickOption('${sec.id}','${b.id}','${o.id}')" onkeydown="if((event.key==='Enter'||event.key===' ')&&!document.body.classList.contains('editing')){event.preventDefault();pickOption('${sec.id}','${b.id}','${o.id}');}">
        <span class="dot"></span>
        <span style="flex:1;"><span data-edit data-sec="${sec.id}" data-blk="${b.id}" data-field="opt:${o.id}" data-ph="${esc(t().optPh)}" onclick="if(document.body.classList.contains('editing'))event.stopPropagation();">${esc(o.text[state.lang])}</span>${corrTag}</span>
        ${optTools}
      </div>`;
    }).join('');
    let fb = '';
    let chosenCorrect = false;
    if (b._sel){
      const chosen = b.options.find(o=>o.id===b._sel);
      chosenCorrect = !!(chosen && chosen.correct);
      fb = chosenCorrect ? `<div class="fb ok">${esc(t().fbOk)}</div>` : `<div class="fb bad">${esc(t().fbBad)}</div>`;
    }
    const explHtml = renderQuizExplanation(sec, b, chosenCorrect);
    return `<div class="b-wrap reveal" id="${rid}">
      <div class="b-quiz">
        ${questionHtml}
        <div role="radiogroup" aria-label="${esc(b.question[state.lang]||'')}">${opts}</div>
        ${inExamSingle ? '' : fb}
        ${inExamSingle ? '' : explHtml}
        <div class="etools editonly"><button class="ebtn" onclick="addOption('${sec.id}','${b.id}')">${esc(t().addOpt)}</button></div>
      </div>
      ${blockTools(sec,b)}
    </div>`;
  }
  return '';
}

function bindSection(m, sec){
  document.querySelectorAll(`[data-sec="${sec.id}"]:not(.txt-rich)`).forEach(el => {
    if (!state.editing) return;
    el.addEventListener('blur', () => {
      const field = el.getAttribute('data-field');
      const blkId = el.getAttribute('data-blk');
      const txt = el.textContent.replace(/\u00a0/g,' ').trim();
      let target = null;
      if (!blkId && field === 'title') target = { obj: sec, key:'title' };
      else if (!blkId && field === 'subtitle') target = { obj: sec, key:'subtitle' };
      else {
        const b = sec.blocks.find(x=>x.id===blkId);
        if (!b) return;
        if (field === 'caption'){ if (!b.caption) b.caption = bi(); target = { obj:b, key:'caption' }; }
        else if (field === 'alt'){ if (!b.alt) b.alt = bi(); target = { obj:b, key:'alt' }; }
        else if (field === 'transcript'){ if (!b.transcript) b.transcript = bi(); target = { obj:b, key:'transcript' }; }
        else if (field === 'question') target = { obj:b, key:'question' };
        else if (field === 'explanation'){ if (!b.explanation) b.explanation = bi(); target = { obj:b, key:'explanation' }; }
        else if (field && field.startsWith('opt:')){
          const o = b.options.find(x=>x.id===field.slice(4));
          if (o) target = { obj:o, key:'text' };
        }
      }
      if (target && saveBilingualField(target.obj, target.key, state.lang, txt)){
        saveProject(true); toast(t().savedToast);
      }
    });
  });
}

/* ---------------- Texto enriquecido: binding de blur ---------------- */
function bindRichText(root){
  root.querySelectorAll('.txt-rich').forEach(el => {
    if (!state.editing) return;
    el.addEventListener('blur', () => {
      if (el.innerHTML === '<br>' || el.innerHTML === '<br/>') el.innerHTML = '';
      saveRich(el);
    });
  });
}

/* ---------------- Medios: hidratar desde IndexedDB ---------------- */
async function hydrateMedia(){
  /* Fondos de slide con imagen */
  const bgEls = document.querySelectorAll('[data-bg-media]');
  for (const el of bgEls){
    const id = el.getAttribute('data-bg-media');
    const ov = Math.min(85, Math.max(0, parseInt(el.getAttribute('data-overlay')||'35',10))) / 100;
    const u = await urlFor(id);
    if (u) el.style.backgroundImage = `linear-gradient(rgba(13,27,42,${ov}), rgba(13,27,42,${ov})), url("${u}")`;
  }
  const holders = document.querySelectorAll('[data-media-holder]');
  for (const h of holders){
    const blkId = h.getAttribute('data-media-holder');
    const kind = h.getAttribute('data-kind');
    const m = state.project.modules[state.currentModule];
    let blk = null;
    for (const s of m.sections){ const f = s.blocks.find(b=>b.id===blkId); if (f){ blk = f; break; } }
    if (!blk) continue;
    let mid = blk.mediaId;
    if (mid && typeof mid === 'object') mid = mid[state.lang] || null;
    if (!mid) continue;
    const u = await urlFor(mid);
    if (!u){ h.outerHTML = `<div class="b-empty">${esc(t().emptyImage)}</div>`; continue; }
    if (kind === 'image'){
      const altTxt = (blk.alt && blk.alt[state.lang]) || (blk.caption && blk.caption[state.lang]) || '';
      const fit = getCustom(blk).fit === 'contain' ? 'contain' : 'cover';
      h.innerHTML = `<img src="${u}" alt="${esc(altTxt)}" style="object-fit:${fit};${fit==='contain'?'background:rgba(0,0,0,0.04);':''}">`;
    }
    else if (kind === 'video') h.innerHTML = `<video src="${u}" controls preload="metadata"></video>`;
    else if (kind === 'audio') h.innerHTML = `<audio src="${u}" controls preload="metadata"></audio>`;
    else if (kind === 'file'){
      const name = blk.mediaName || 'archivo';
      const ext = (name.split('.').pop()||'').toLowerCase();
      h.innerHTML = `<a class="b-file-link" href="${u}" download="${esc(name)}">
        <span class="file-icon">${fileIconFor(ext)}</span>
        <span class="file-name">${esc(name)}</span>
        <span class="file-dl">⬇</span>
      </a>`;
    }
  }
}
function fileIconFor(ext){
  const map = { pdf:'📄', doc:'📝', docx:'📝', xls:'📊', xlsx:'📊', csv:'📊', ppt:'📈', pptx:'📈', zip:'🗜️', rar:'🗜️', txt:'📄' };
  return map[ext] || '📎';
}

/* ---------------- Drawer ---------------- */
function renderDrawer(){
  const body = document.getElementById('drawerBody');
  const mods = state.project.modules;
  const lockOn = !state.editing && state.project.settings && state.project.settings.sequentialLock;
  const firstLocked = lockOn ? firstUnpassedModuleIndex(state.project) : Infinity;
  body.innerHTML = mods.map((m,i)=>{
    const quizCount = moduleQuizIds(m).length;
    const score = quizCount ? moduleScore(state.project, m.id) : null;
    const locked = lockOn && i > firstLocked;
    const scoreBadge = (!state.editing && score !== null) ? `<span class="score">${esc(t().moduleScoreBadge(score))}</span>` : '';
    return `
    <div class="mod-item ${i===state.currentModule?'cur':''} ${locked?'locked':''}">
      <div class="num">${locked ? '🔒' : (i+1)}</div>
      <div class="info" role="button" tabindex="0" onclick="gotoModule(${i});toggleDrawer(false)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();gotoModule(${i});toggleDrawer(false);}">
        <b>${esc(m.hero.title[state.lang] || m.hero.title.es || t().newModuleTitle)}</b>
        <span>${esc(t().sections(m.sections.length))}${scoreBadge}</span>
      </div>
      <div class="acts editonly">
        <button class="ibtn" title="${esc(t().dupModule)}" onclick="duplicateModule(${i})">⧉</button>
        <button class="ibtn" title="${esc(t().up)}" onclick="moveModule(${i},-1)">↑</button>
        <button class="ibtn" title="${esc(t().down)}" onclick="moveModule(${i},1)">↓</button>
        <button class="ibtn danger" title="${esc(t().del)}" onclick="askDelModule(${i})">🗑</button>
      </div>
    </div>
    <div class="mod-sections">
      ${m.sections.map(s=>`<div class="mod-sec-item" role="button" tabindex="0" onclick="gotoSection(${i},'${s.id}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();gotoSection(${i},'${s.id}');}">${esc(s.title[state.lang] || s.title.es || t().newSectionTitle)}</div>`).join('')}
    </div>`;
  }).join('');

  const summaryEl = document.getElementById('progressSummary');
  if (!state.editing){
    const st = courseProgressStats(state.project);
    summaryEl.textContent = t().progressSummary(st.modDone, st.modTotal, st.quizDone, st.quizTotal);
    summaryEl.style.display = '';
  } else {
    summaryEl.style.display = 'none';
  }
}

var qrcode = function() {

  /**

  var qrcode = function(typeNumber, errorCorrectionLevel) {

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);

      if (_dataCache == null) {

/* ---------------- Panel de estilo por slide ---------------- */
let styleTarget = null; // {kind:'hero'|'sec', id}
function setGlobalFont(v){
  state.project.org.font = v;
  saveProject(true); renderAll();
}
function resolveStyleTarget(){
  if (!styleTarget) return null;
  const m = curMod();
  if (styleTarget.kind === 'hero'){
    if (m.id !== styleTarget.id) return null;
    return { obj: m.hero, isHero:true, baseTheme:'navy', label: t().stylePanelHero };
  }
  const i = m.sections.findIndex(s=>s.id===styleTarget.id);
  if (i < 0) return null;
  return { obj: m.sections[i], isHero:false, baseTheme: m.sections[i].theme, label: t().stylePanelSec(i+1) };
}
function openStylePanel(kind, id){
  closeSymbolPanel(); closeBrandPanel(); closeTrashPanel(); closeAdminPanel(); closeCertPanel(); closeMotivationPanel();
  styleTarget = { kind, id };
  buildStylePanel();
  document.getElementById('stylePanel').classList.add('open');
}
function closeStylePanel(){
  styleTarget = null;
  document.getElementById('stylePanel').classList.remove('open');
}
function spApply(rebuild){
  saveProject(true);
  renderModule();
  requestAnimationFrame(setupReveals);
  if (rebuild) buildStylePanel();
}
function spSel(label, value, opts, onchange){
  const id = uid();
  setTimeout(()=>{ const el = document.getElementById(id); if (el) el.onchange = ()=>onchange(el.value); },0);
  return `<div class="sp-row"><span class="sp-label">${esc(label)}</span>
    <select id="${id}">${opts.map(o=>`<option value="${esc(o[0])}" ${String(o[0])===String(value)?'selected':''}>${esc(o[1])}</option>`).join('')}</select></div>`;
}
function spColor(label, value, onchange, resetCb){
  const id = uid(), rid = uid();
  setTimeout(()=>{
    const el = document.getElementById(id); if (el) el.oninput = ()=>onchange(el.value);
    const rb = document.getElementById(rid); if (rb && resetCb) rb.onclick = resetCb;
  },0);
  return `<label>${esc(label)} <input type="color" id="${id}" value="${esc(value)}">${resetCb?` <button class="ibtn" id="${rid}" title="${esc(t().autoLbl)}">${esc(t().resetOne)}</button>`:''}</label>`;
}
function spRange(label, value, min, max, onchange){
  const id = uid();
  setTimeout(()=>{ const el = document.getElementById(id); if (el) el.oninput = ()=>onchange(+el.value); },0);
  return `<div class="sp-row"><span class="sp-label">${esc(label)}</span>
    <input type="range" id="${id}" min="${min}" max="${max}" value="${esc(value)}"></div>`;
}
function buildStylePanel(){
  const tg = resolveStyleTarget();
  const panel = document.getElementById('stylePanel');
  if (!tg){ panel.classList.remove('open'); return; }
  const c = getCustom(tg.obj);
  document.getElementById('spTitle').textContent = tg.label;
  const body = document.getElementById('spBody');
  let html = '';

  /* Tipografía */
  html += spSel(t().font, c.font || '', [['', t().fontDefault], ...FONTS], (v)=>{ c.font = v; spApply(); });

  /* Tamaño de letra de los bloques de texto de esta slide */
  html += spSel(t().fontSizeLbl, c.textSize || '', [
    ['', t().fsAuto], ['sm', t().fsSm], ['md', t().fsMd], ['lg', t().fsLg], ['xl', t().fsXl]
  ], (v)=>{ if (v) c.textSize = v; else delete c.textSize; spApply(); });

  /* Disposición (solo secciones) o alineación (portada) */
  if (!tg.isHero){
    html += spSel(t().layout, c.layout || 'stack', [
      ['stack', t().layoutStack], ['cols2', t().layoutCols],
      ['splitR', t().layoutSplitR], ['splitL', t().layoutSplitL],
      ['narrow', t().layoutNarrow]
    ], (v)=>{ c.layout = v; spApply(); });
    html += spSel(t().heroTitleSizeLbl, c.titleSize || '', [
      ['', t().heroTitleSizeAuto], ['sm', t().heroTitleSizeSm], ['md', t().heroTitleSizeMd],
      ['lg', t().heroTitleSizeLg], ['xl', t().heroTitleSizeXl], ['xxl', t().heroTitleSizeXxl]
    ], (v)=>{ if (v) c.titleSize = v; else delete c.titleSize; spApply(); });
    const secNowrapId = uid();
    setTimeout(()=>{ const el = document.getElementById(secNowrapId); if (el) el.onchange = ()=>{ c.titleNowrap = el.checked; spApply(); }; },0);
    html += `<label class="sp-row" style="display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--body);cursor:pointer;">
      <input type="checkbox" id="${secNowrapId}" ${c.titleNowrap?'checked':''}> ${esc(t().heroTitleNowrapLbl)}
    </label>`;
  } else {
    html += spSel(t().alignLbl, c.align || 'center', [['center',t().alignCenter],['left',t().alignLeft]], (v)=>{ c.align = v; spApply(); });
    html += spSel(t().heroTitleSizeLbl, c.titleSize || '', [
      ['', t().heroTitleSizeAuto], ['sm', t().heroTitleSizeSm], ['md', t().heroTitleSizeMd],
      ['lg', t().heroTitleSizeLg], ['xl', t().heroTitleSizeXl], ['xxl', t().heroTitleSizeXxl]
    ], (v)=>{ if (v) c.titleSize = v; else delete c.titleSize; spApply(); });
    const nowrapId = uid();
    setTimeout(()=>{ const el = document.getElementById(nowrapId); if (el) el.onchange = ()=>{ c.titleNowrap = el.checked; spApply(); }; },0);
    html += `<label class="sp-row" style="display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--body);cursor:pointer;">
      <input type="checkbox" id="${nowrapId}" ${c.titleNowrap?'checked':''}> ${esc(t().heroTitleNowrapLbl)}
    </label>`;
  }

  /* Fondo */
  const bgType = c.bgType || 'preset';
  html += spSel(t().bg, bgType==='preset' ? 'preset:'+(c.preset || tg.baseTheme || 'light') : bgType, [
    ['preset:light', t().bgLight], ['preset:navy', t().bgNavy],
    ['color', t().bgColor], ['grad', t().bgGrad], ['image', t().bgImage]
  ], (v)=>{
    if (v.startsWith('preset:')){ c.bgType='preset'; c.preset=v.split(':')[1]; }
    else c.bgType = v;
    spApply(true);
  });

  if (bgType === 'color'){
    html += `<div class="sp-row sp-colors">${spColor(t().color1, c.bgColor || '#FAF9F5', (v)=>{ c.bgColor=v; spApply(); })}</div>`;
  }
  if (bgType === 'grad'){
    html += `<div class="sp-row sp-colors">
      ${spColor(t().color1, c.bgColor || '#0F2540', (v)=>{ c.bgColor=v; spApply(); })}
      ${spColor(t().color2, c.bgColor2 || '#2E6BA6', (v)=>{ c.bgColor2=v; spApply(); })}
    </div>`;
    html += spRange(t().angle + ' (' + (c.bgAngle==null?135:c.bgAngle) + '°)', c.bgAngle==null?135:c.bgAngle, 0, 360, (v)=>{ c.bgAngle=v; spApply(true); });
  }
  if (bgType === 'image'){
    const pid = uid();
    setTimeout(()=>{ const el = document.getElementById(pid); if (el) el.onchange = (ev)=>onBgImagePick(ev); },0);
    html += `<div class="sp-row">
      <label class="ebtn" style="cursor:pointer;display:inline-flex;">${esc(c.bgImageId ? t().changeImg : t().chooseImg)}<input type="file" id="${pid}" accept="image/*" style="display:none"></label>
      <div class="sp-note">${esc(t().bgImgNote)}</div>
    </div>`;
    html += spRange(t().overlay + ' (' + (c.overlay==null?35:c.overlay) + '%)', c.overlay==null?35:c.overlay, 0, 85, (v)=>{ c.overlay=v; spApply(true); });
  }

  /* Tono del texto y color de títulos */
  html += spSel(t().textTone, c.tone || 'auto', [['auto',t().toneAuto],['dark',t().toneDark],['light',t().toneLight]], (v)=>{ c.tone = v==='auto'?'':v; if(!c.tone) delete c.tone; spApply(); });
  html += `<div class="sp-row sp-colors">${spColor(t().titleColor, c.titleColor || '#0F2540', (v)=>{ c.titleColor=v; spApply(); }, ()=>{ delete c.titleColor; spApply(true); })}</div>`;

  /* Restablecer */
  const rid2 = uid();
  setTimeout(()=>{ const el = document.getElementById(rid2); if (el) el.onclick = async ()=>{
    if (c.bgImageId){ invalidateMedia(c.bgImageId); await delMedia(c.bgImageId); }
    tg.obj.custom = {};
    spApply(true);
  }; },0);
  html += `<div class="sp-actions"><button class="ebtn danger" id="${rid2}">${esc(t().styleReset)}</button></div>`;

  body.innerHTML = html;
}
async function onBgImagePick(ev){
  const file = ev.target.files && ev.target.files[0];
  if (!file) return;
  const tg = resolveStyleTarget();
  if (!tg) return;
  const c = getCustom(tg.obj);
  if (file.size > 80*1024*1024) toast(t().mediaBig, 3600);
  const newId = uid();
  try {
    await putMedia(newId, file);
    if (c.bgImageId){ invalidateMedia(c.bgImageId); await delMedia(c.bgImageId); }
    c.bgImageId = newId;
    spApply(true);
    toast(t().mediaSaved);
  } catch(e){ toast(t().mediaErr, 3600); }
}

/* ---------------- Encabezado de marca: badge y nombre editables ---------------- */
function bindBrandEditable(){
  const badgeEl = document.getElementById('brandBadge');
  const titleEl = document.getElementById('brandTitle');
  if (state.editing){
    badgeEl.setAttribute('contenteditable','plaintext-only');
    badgeEl.setAttribute('spellcheck','false');
    badgeEl.setAttribute('autocapitalize','off');
    titleEl.setAttribute('contenteditable','plaintext-only');
    titleEl.setAttribute('spellcheck','false');
    titleEl.setAttribute('autocapitalize','off');
  } else {
    badgeEl.removeAttribute('contenteditable');
    titleEl.removeAttribute('contenteditable');
  }
  if (!badgeEl._bound){
    badgeEl.addEventListener('blur', () => {
      const v = badgeEl.textContent.replace(/\u00a0/g,' ').trim().slice(0,6);
      const finalV = v || 'ORG';
      if (state.project.org.badge !== finalV){ state.project.org.badge = finalV; saveProject(true); }
      badgeEl.textContent = finalV;
      updateDocTitle();
    });
    badgeEl._bound = true;
  }
  if (!titleEl._bound){
    titleEl.addEventListener('blur', () => {
      const v = titleEl.textContent.replace(/\u00a0/g,' ').trim();
      if (saveBilingualField(state.project.org, 'title', state.lang, v)) saveProject(true);
      updateDocTitle();
    });
    titleEl._bound = true;
  }
}
function updateDocTitle(){
  const p = state.project;
  document.title = (p.org.badge||'HSA') + ' · ' + (p.org.title[state.lang] || p.org.title.es || 'e-Learning');
}
function applyBrandColor(){
  let styleEl = document.getElementById('brandColorStyle');
  if (!styleEl){
    styleEl = document.createElement('style');
    styleEl.id = 'brandColorStyle';
    document.head.appendChild(styleEl);
  }
  const c = state.project.org.brandColor || '#B0342F';
  styleEl.textContent = `:root{--brand:${c};--brand-soft:${lighten(c,0.55)};}`;
}
function setBrandColor(v){
  state.project.org.brandColor = v;
  saveProject(true);
  applyBrandColor();
}

/* ---------------- Configuración e identidad del capacitando ---------------- */
function setRequireIdentity(v){
  state.project.settings = state.project.settings || {};
  state.project.settings.requireIdentity = v;
  saveProject(true);
}
async function hydrateHeaderLogo(){
  const el = document.getElementById('hdrLogo');
  const removeBtn = document.getElementById('hdrLogoRemoveBtn');
  if (!el) return;
  const id = state.project.org && state.project.org.headerLogoMediaId;
  if (!id){
    el.innerHTML = '';
    if (removeBtn) removeBtn.style.display = 'none';
    return;
  }
  try {
    const u = await urlFor(id);
    if (u) el.innerHTML = `<img src="${u}" alt="">`;
    if (removeBtn) removeBtn.style.display = 'flex';
  } catch(e){}
}
async function onHeaderLogoPick(ev){
  const file = ev.target.files && ev.target.files[0];
  ev.target.value = '';
  if (!file) return;
  state.project.org = state.project.org || {};
  const oldId = state.project.org.headerLogoMediaId;
  const newId = uid();
  try {
    await putMedia(newId, file);
    if (oldId){ invalidateMedia(oldId); await delMedia(oldId); }
    state.project.org.headerLogoMediaId = newId;
    saveProject(true);
    hydrateHeaderLogo();
    toast(t().hdrLogoSaved);
  } catch(e){
    toast(t().mediaErr, 3600);
  }
}
async function removeHeaderLogo(){
  const org = state.project.org;
  if (!org || !org.headerLogoMediaId) return;
  const oldId = org.headerLogoMediaId;
  invalidateMedia(oldId);
  try { await delMedia(oldId); } catch(e){}
  org.headerLogoMediaId = null;
  saveProject(true);
  hydrateHeaderLogo();
}
function setPassingScore(v){
  state.project.settings = state.project.settings || {};
  state.project.settings.passingScore = parseInt(v,10) || 80;
  saveProject(true); renderAll();
}
function setFinalModule(v){
  state.project.settings = state.project.settings || {};
  state.project.settings.finalModuleId = v || null;
  saveProject(true); renderAll();
}
function setExamModule(v){
  state.project.settings = state.project.settings || {};
  const newId = v || null;
  const prevId = state.project.settings.examModuleId;
  state.project.settings.examModuleId = newId;
  // El módulo de evaluación es, en la enorme mayoría de los casos, también el
  // último módulo del curso: lo sincronizamos automáticamente para que alcance
  // con elegirlo en un solo lugar.
  if (newId) state.project.settings.finalModuleId = newId;
  saveProject(true);
  // Si se asigna o se cambia el módulo de examen, se limpia cualquier progreso
  // de examen anterior (incluidas preguntas que ya hubieran quedado marcadas
  // como aprobadas por el flujo normal antes de convertirse en examen), para
  // que la aprobación con intentos limitados arranque siempre de cero.
  if (newId){
    const mod = state.project.modules.find(m=>m.id===newId);
    const prog = getProgress();
    prog.examPassed = false;
    prog.examAttempts = 0;
    prog.examScore = null;
    if (mod){
      const idsInExam = [];
      for (const s of mod.sections) for (const b of s.blocks){
        if (b.type === 'quiz'){
          idsInExam.push(b.id);
          // limpiar también la selección visual en memoria (no solo el progreso guardado),
          // para que no queden marcadas respuestas de pruebas anteriores al abrir el módulo
          b._sel = null; b._selMulti = []; b._verified = false; b._allCorrect = false;
        }
      }
      prog.quizzesPassed = prog.quizzesPassed.filter(id => !idsInExam.includes(id));
    }
    saveProgressData(prog);
  }
  renderAll();
}
function setMaxExamAttempts(v){
  state.project.settings = state.project.settings || {};
  state.project.settings.maxExamAttempts = parseInt(v,10) || 3;

function setTrackingUrl(v){
  state.project.settings = state.project.settings || {};
  state.project.settings.trackingUrl = (v||'').trim();

let reportingInFlight = false;
async function maybeReportCompletion(){
  if (state.editing) return;
  if (reportingInFlight) return;
  const url = state.project.settings && state.project.settings.trackingUrl;
  if (!url) return;
  if (!isCourseComplete(state.project)) return;
  const prog = getProgress();
  if (prog.reportedAt) return; // ya reportado desde este dispositivo
  const payload = buildResultPayload();
  if (!payload) return;
  if (typeof fetch !== 'function') return;
  reportingInFlight = true;
  try {
    await fetch(url, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
    prog.reportedAt = Date.now();
    saveProgressData(prog);
  } catch(e){
    // sin conexión o URL no disponible: se reintentará en la próxima visita
  } finally {
    reportingInFlight = false;
  }
}

/* ---------------- Papelera / deshacer ---------------- */
function pushTrash(kind, label, data, restoreContext){
  state.project.trash = state.project.trash || [];
  state.project.trash.unshift({ id: uid(), deletedAt: Date.now(), kind, label, data, restoreContext });
  const MAX_TRASH = 15;
  while (state.project.trash.length > MAX_TRASH){
    const dropped = state.project.trash.pop();
    permanentlyDeleteMediaOf(dropped);
  }
}
function collectMediaIdsFromEntry(data, kind){
  const ids = [];
  if (kind === 'block'){ ids.push(...mediaIdsOf(data.mediaId)); }
  else if (kind === 'section'){
    if (data.custom && data.custom.bgImageId) ids.push(data.custom.bgImageId);
    for (const b of data.blocks||[]) ids.push(...mediaIdsOf(b.mediaId));
  } else if (kind === 'module'){
    if (data.hero.custom && data.hero.custom.bgImageId) ids.push(data.hero.custom.bgImageId);
    for (const s of data.sections||[]){
      if (s.custom && s.custom.bgImageId) ids.push(s.custom.bgImageId);
      for (const b of s.blocks||[]) ids.push(...mediaIdsOf(b.mediaId));
    }
  }
  return ids;
}
async function permanentlyDeleteMediaOf(entry){
  for (const id of collectMediaIdsFromEntry(entry.data, entry.kind)){
    invalidateMedia(id);
    await delMedia(id);
  }
}
async function restoreTrash(entryId){
  const arr = state.project.trash || [];
  const idx = arr.findIndex(e=>e.id===entryId);
  if (idx < 0) return;
  const entry = arr[idx];
  let ok = false;
  if (entry.kind === 'module'){
    const insertAt = Math.min(entry.restoreContext.index, state.project.modules.length);
    state.project.modules.splice(insertAt, 0, entry.data);
    state.currentModule = insertAt;
    ok = true;
  } else if (entry.kind === 'section'){
    const m = state.project.modules.find(x=>x.id===entry.restoreContext.moduleId);
    if (m){ const insertAt = Math.min(entry.restoreContext.index, m.sections.length); m.sections.splice(insertAt, 0, entry.data); ok = true; }
  } else if (entry.kind === 'block'){
    let s = null;
    for (const m of state.project.modules){ const f = m.sections.find(x=>x.id===entry.restoreContext.sectionId); if (f){ s = f; break; } }
    if (s){ const insertAt = Math.min(entry.restoreContext.index, s.blocks.length); s.blocks.splice(insertAt, 0, entry.data); ok = true; }
  }
  if (ok){
    arr.splice(idx,1);
    saveProject(true); renderAll();
    toast(t().restoredToast);
    buildTrashPanel();
  } else {
    toast(t().cantRestore, 3200);
  }
}

function buildResultPayload(){
  const learner = getLearnerIdentity();
  if (!learner || !learner.name) return null;
  const p = state.project;
  const examModuleId = p.settings && p.settings.examModuleId;
  const prog = getProgress();
  const perModule = p.modules.map(m => ({
    moduleId: m.id,
    title: m.hero.title[state.lang] || m.hero.title.es || '',
    score: (examModuleId && m.id === examModuleId && prog.examScore != null) ? prog.examScore : moduleScore(p, m.id)
  }));
  const overallScore = perModule.length ? Math.round(perModule.reduce((a,m)=>a+m.score,0) / perModule.length) : 100;
  const completedAt = new Date().toISOString();
  const code = computeVerificationCode(`${learner.name}|${p.org.title.es||p.org.title.en||''}|${completedAt.slice(0,10)}`);
  return {
    app: 'hsa-elearning-result', version: 1,
    learner: { name: learner.name, email: learner.email || '' },
    courseTitle: p.org.title.es || p.org.title.en || '',
    courseBadge: p.org.badge || '',
    completedAt, perModule, overallScore,
    verificationCode: code
  };
}

async function syncCompletionsFromCloud(){
  const url = state.project.settings && state.project.settings.trackingUrl;
  if (!url){ toast(t().adminSyncCloudHint, 3200); return; }
  if (typeof fetch !== 'function') return;
  try {
    const res = await fetch(url, { method:'GET' });
    const list = await res.json();
    if (!Array.isArray(list)) throw new Error('respuesta inesperada');
    state.project.completionLog = state.project.completionLog || [];
    let added = 0;
    list.forEach(entry => {
      if (!entry || !entry.verificationCode) return;
      const dup = state.project.completionLog.some(e => e.verificationCode === entry.verificationCode);
      if (!dup){ state.project.completionLog.push(entry); added++; }
    });
    saveProject(true);
    buildAdminPanel();
    toast(t().adminSyncDone(added));
  } catch(e){
    toast(t().adminSyncError, 3600);
  }

function exportResultsCsv(){

  const csv = [header, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type:'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `resultados_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 4000);
}

/* ---------------- Estimación de almacenamiento usado ---------------- */
async function getStorageEstimate(){
  try {
    if (navigator.storage && navigator.storage.estimate){
      const est = await navigator.storage.estimate();
      return { usage: est.usage||0, quota: est.quota||0 };
    }
  } catch(e){}
  return null;
}
function formatBytes(bytes){
  if (!bytes || bytes <= 0) return '0 B';
  if (bytes < 1024) return Math.round(bytes) + ' B';
  const units = ['KB','MB','GB','TB'];
  let val = bytes, i = -1;
  do { val /= 1024; i++; } while (val >= 1024 && i < units.length-1);
  return val.toFixed(1) + ' ' + units[i];
}
async function refreshStorageInfo(){
  const el = document.getElementById('storageInfo');
  if (!el) return;
  const est = await getStorageEstimate();
  if (!est || !est.quota){ el.style.display = 'none'; return; }
  el.textContent = t().storageUsed(formatBytes(est.usage), formatBytes(est.quota));
  el.style.display = '';
}

async function cloneMediaId(id){
  if (!id) return null;
  try {
    const blob = await getMedia(id);
    if (!blob) return null;
    const nid = uid();
    await putMedia(nid, blob);
    return nid;
  } catch(e){ return null; }
}
async function cloneMediaField(mediaId){
  if (!mediaId) return mediaId;
  if (typeof mediaId === 'object'){
    return {
      es: mediaId.es ? await cloneMediaId(mediaId.es) : null,
      en: mediaId.en ? await cloneMediaId(mediaId.en) : null
    };
  }
  return await cloneMediaId(mediaId);
}

/* ---------------- Medios ---------------- */
async function onMediaPick(ev, secId, blkId){
  const file = ev.target.files && ev.target.files[0];
  if (!file) return;
  if (file.size > 80*1024*1024) toast(t().mediaBig, 3600);
  const s = findSec(secId); if (!s) return;
  const b = s.blocks.find(x=>x.id===blkId); if (!b) return;
  const newId = uid();
  const isBiMedia = (b.type === 'audio' || b.type === 'video');
  try {
    await putMedia(newId, file);
    if (isBiMedia){
      b.mediaId = b.mediaId || { es:null, en:null };
      b.mediaName = b.mediaName || { es:null, en:null };
      const oldId = b.mediaId[state.lang];
      if (oldId){ invalidateMedia(oldId); await delMedia(oldId); }
      b.mediaId[state.lang] = newId;
      b.mediaName[state.lang] = file.name;
      if (b.type === 'video' && b.videoUrl) b.videoUrl[state.lang] = null;
    } else {
      if (b.mediaId){ invalidateMedia(b.mediaId); await delMedia(b.mediaId); }
      b.mediaId = newId;
      b.mediaName = file.name;
    }
    saveProject(true); renderAll(); toast(t().mediaSaved);
  } catch(e){
    toast(t().mediaErr, 3600);
  }
}
function toEmbedUrl(url){
  if (!url) return null;
  let m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{6,})/);
  if (m) return `https://www.youtube.com/embed/${m[1]}`;
  m = url.match(/vimeo\.com\/(?:video\/)?(\d+)/);
  if (m) return `https://player.vimeo.com/video/${m[1]}`;
  return null;
}
async function setVideoUrl(secId, blkId){
  const s = findSec(secId); const b = s && s.blocks.find(x=>x.id===blkId);
  if (!b) return;
  b.videoUrl = b.videoUrl || { es:null, en:null };
  const current = b.videoUrl[state.lang] || '';
  const url = window.prompt(t().videoUrlPrompt, current);
  if (url === null) return;
  const trimmed = url.trim();
  if (!trimmed){
    b.videoUrl[state.lang] = null;
    saveProject(true); renderAll();
    return;
  }
  const embed = toEmbedUrl(trimmed);
  if (!embed){ toast(t().videoUrlInvalid, 3600); return; }
  b.videoUrl[state.lang] = trimmed;
  b.mediaId = b.mediaId || { es:null, en:null };
  const oldId = b.mediaId[state.lang];
  if (oldId){
    invalidateMedia(oldId); await delMedia(oldId);
    b.mediaId[state.lang] = null;
    b.mediaName = b.mediaName || { es:null, en:null };
    b.mediaName[state.lang] = null;
  }
  saveProject(true); renderAll();
}
function cycleCalloutVariant(secId, blkId){
  const s = findSec(secId); const b = s && s.blocks.find(x=>x.id===blkId);
  if (!b) return;
  const order = ['info','warning','success','danger'];
  const i = order.indexOf(b.variant||'info');
  b.variant = order[(i+1)%order.length];
  saveProject(true); renderAll();
}

/* ---------------- Posición libre: arrastrar y redimensionar ---------------- */
function startFreeDrag(ev, secId, blkId, mode){
  ev.preventDefault();
  ev.stopPropagation();
  const canvas = document.querySelector(`[data-canvas="${secId}"]`);
  const item = document.querySelector(`[data-free-item="${blkId}"]`);
  if (!canvas || !item) return;
  const s = findSec(secId); const b = s && s.blocks.find(x=>x.id===blkId);
  if (!b) return;
  const rect = canvas.getBoundingClientRect();
  const startX = ev.clientX, startY = ev.clientY;
  const start = { x: b.freePos.x, y: b.freePos.y, w: b.freePos.w, h: b.freePos.h };
  let pending = null;
  function onMove(e){
    const dxPct = ((e.clientX - startX) / rect.width) * 100;
    const dyPx = e.clientY - startY;
    let np = { x: start.x, y: start.y, w: start.w, h: start.h, _px: true };
    if (mode === 'move'){
      np.x = Math.max(0, Math.min(100 - start.w, start.x + dxPct));
      np.y = Math.max(0, start.y + dyPx);
    } else {
      np.w = Math.max(10, Math.min(100 - start.x, start.w + dxPct));
      np.h = Math.max(40, start.h + dyPx);
    }
    item.style.left = np.x + '%';
    item.style.top = np.y + 'px';
    item.style.width = np.w + '%';
    item.style.height = np.h + 'px';
    pending = np;
  }
  function onUp(){
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    if (pending){ b.freePos = pending; saveProject(true); }
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}
function toggleBlockFree(secId, blkId){
  const s = findSec(secId); const b = s && s.blocks.find(x=>x.id===blkId);
  if (!b) return;
  const c = getCustom(b);
  const turningOn = !c.free;
  if (turningOn && !b.freePos){
    // capturar la posición y el tamaño actuales en pantalla para que el elemento
    // no salte de lugar al pasar a posición libre
    const el = document.getElementById('rv-'+blkId);
    const canvas = document.querySelector(`section[data-marker="${secId}"] .blk-inner`);
    if (el && canvas){
      const er = el.getBoundingClientRect();
      const cr = canvas.getBoundingClientRect();
      if (cr.width > 0 && er.width > 0){
        b.freePos = {
          x: Math.max(0, ((er.left - cr.left) / cr.width) * 100),
          y: Math.max(0, Math.round(er.top - cr.top)),
          w: Math.min(100, Math.max(10, (er.width / cr.width) * 100)),
          h: Math.max(40, Math.round(er.height)),
          _px: true
        };
      }
    }
  }
  c.free = turningOn;
  if (c.free){
    if (!b.freePos) b.freePos = { x: 10, y: 20, w: 40, h: 200, _px: true };
    toast(t().freeModeNote, 6000);
  }
  saveProject(true); renderAll();
}
function startFreeCanvasResize(ev, secId){
  ev.preventDefault();
  ev.stopPropagation();
  const canvas = document.querySelector(`[data-canvas="${secId}"]`);
  const s = findSec(secId);

  s.custom = s.custom || {};
  const startY = ev.clientY;
  const startH = s.custom.freeCanvasHeight || 480;
  let pending = startH;
  function onMove(e){
    pending = Math.max(150, Math.min(2200, startH + (e.clientY - startY)));
    canvas.style.minHeight = pending + 'px';
  }
  function onUp(){
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    s.custom.freeCanvasHeight = Math.round(pending);
    saveProject(true);
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function buildVerificationQrSvg(url, cellSize){
  if (!url) return '';
  try {
    const qr = qrcode(0, 'M'); // tamaño automático, corrección de errores media
    qr.addData(url);

    return qr.createSvgTag(cellSize || 4, 8);
  } catch(e){ return ''; }
}
function encodeVerificationPayload(obj){
  const json = JSON.stringify(obj);
  return btoa(unescape(encodeURIComponent(json))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function decodeVerificationPayload(b64){
  try {
    const restored = b64.replace(/-/g,'+').replace(/_/g,'/');
    const json = decodeURIComponent(escape(atob(restored)));
    return JSON.parse(json);
  } catch(e){ return null; }
}
function buildVerificationUrl(learnerName, courseTitle, dateStr, code, score){
  if (!/^https?:/.test(window.location.protocol)) return null; // sin hosting, un enlace no le sirve a otro dispositivo

  return base + '?verify=' + payload;

function spawnConfettiBurst(container){

    const peak = -(58 + Math.random()*34);      // impulso hacia arriba, con variación
    const fall = peak + (18 + Math.random()*22); // después cae un poco, efecto de arco real
    const drift = (Math.random()-0.5) * 46;

    el.style.left = startX + '%';
    el.style.setProperty('--peak', peak + 'vh');
    el.style.setProperty('--fall', fall + 'vh');
    el.style.setProperty('--drift', drift + 'vw');
    el.style.setProperty('--spin', spin + 'deg');
    el.style.animationDuration = dur + 's';

function submitExam(){
  const settings = state.project.settings || {};
  const examId = settings.examModuleId;
  const mod = state.project.modules.find(m=>m.id===examId);
  if (!mod) return;
  const quizBlocks = [];
  for (const s of mod.sections) for (const b of s.blocks) if (b.type === 'quiz') quizBlocks.push(b);
  if (!quizBlocks.length) return;

  const unanswered = quizBlocks.filter(b => b.mode === 'multi' ? !(b._selMulti && b._selMulti.length) : !b._sel);
  if (unanswered.length){ toast(t().examAnswerAll, 3200); return; }

  let correct = 0;
  quizBlocks.forEach(b => {
    if (b.mode === 'multi'){
      const sel = new Set(b._selMulti || []);
      const correctIds = new Set(b.options.filter(o=>o.correct).map(o=>o.id));
      const ok = sel.size === correctIds.size && [...sel].every(id=>correctIds.has(id));
      b._verified = true; b._allCorrect = ok;
      if (ok) correct++;
    } else {
      const chosen = b.options.find(o=>o.id===b._sel);
      if (chosen && chosen.correct) correct++;
    }
  });
  const pct = Math.round((correct/quizBlocks.length)*100);
  const passThreshold = settings.passingScore || 80;
  const maxAttempts = settings.maxExamAttempts || 3;
  const prog = getProgress();
  prog.examAttempts = (prog.examAttempts||0) + 1;

  if (pct >= passThreshold){
    quizBlocks.forEach(b => { if (!prog.quizzesPassed.includes(b.id)) prog.quizzesPassed.push(b.id); });
    prog.examPassed = true;
    prog.examScore = pct;
    saveProgressData(prog);
    markModuleVisited(mod.id);
    maybeReportCompletion();
    state.examResultView = { passed:true, pct, attemptsLeft:0, outOfAttempts:false };
    renderAll();
  } else {
    saveProgressData(prog);
    if (prog.examAttempts >= maxAttempts){
      resetAllProgressForRetry();
      state.examResultView = { passed:false, pct, attemptsLeft:0, outOfAttempts:true };
      renderAll();
    } else {
      quizBlocks.forEach(b => { b._sel = null; b._selMulti = []; b._verified = false; });
      const remaining = maxAttempts - prog.examAttempts;
      state.examResultView = { passed:false, pct, attemptsLeft:remaining, outOfAttempts:false };
      renderAll();
    }
  }
}

function copyEsToEn(){
  let n = 0;
  const visit = (obj) => {
    if (!obj || typeof obj !== 'object') return;
    if (Array.isArray(obj)){ obj.forEach(visit); return; }
    if (typeof obj.es === 'string' && typeof obj.en === 'string'){
      if (obj.es && !obj.en){ obj.en = obj.es; n++; }
      return;
    }
    Object.keys(obj).forEach(k => { if (k !== '_enTouched') visit(obj[k]); });
  };
  visit(state.project);
  if (n>0) saveProject(true);
  toast(t().copiedToast(n));
  renderAll();
}

/* ---------------- Exportar / Importar ---------------- */
function blobToDataURL(blob){
  return new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload = ()=>res(r.result);
    r.onerror = ()=>rej(r.error);
    r.readAsDataURL(blob);
  });
}
function dataURLToBlob(du){
  const [meta, data] = du.split(',');
  const mime = (meta.match(/data:([^;]+)/)||[])[1] || 'application/octet-stream';
  const bin = atob(data);
  const arr = new Uint8Array(bin.length);
  for (let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new Blob([arr], {type:mime});
}
async function exportProject(){
  const media = {};
  for (const id of collectMediaIds(state.project)){
    try {
      const blob = await getMedia(id);
      if (blob) media[id] = await blobToDataURL(blob);
    } catch(e){ /* omitir medio ilegible sin frenar el respaldo */ }
  }
  const payload = { app:'hsa-elearning', version:1, exportedAt:new Date().toISOString(), project: state.project, media };
  const blob = new Blob([JSON.stringify(payload)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const stamp = new Date().toISOString().slice(0,10);
  const orgSlug = (state.project.org.badge || 'curso').replace(/[^a-z0-9]+/gi,'').slice(0,12) || 'curso';
  a.download = `elearning_${orgSlug}_${stamp}.json`;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 4000);
  toast(t().exportedToast);
}
async function importProject(ev){
  const file = ev.target.files && ev.target.files[0];
  ev.target.value = '';
  if (!file) return;
  try {
    const txt = await file.text();
    const payload = JSON.parse(txt);
    if (!payload || payload.app!=='hsa-elearning' || !payload.project) throw new Error('bad');
    for (const [id, du] of Object.entries(payload.media||{})){
      try { await putMedia(id, dataURLToBlob(du)); } catch(e){}
    }
    state.project = payload.project;
    state.currentModule = 0;
    mediaURL.forEach(u=>URL.revokeObjectURL(u)); mediaURL.clear();
    saveProject(true); renderAll(); toggleDrawer(false);
    toast(t().importedToast);
  } catch(e){
    toast(t().importErr, 3600);
  }
}

    btn.textContent = actionLabel;
    btn.onclick = () => { actionFn(); el.classList.remove('show'); };
    el.appendChild(btn);
  }
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), ms||1600);
}

let revealObs = null;
function fitHeroTitle(){
  const h1 = document.querySelector('.hero h1');
  if (!h1 || h1.style.whiteSpace !== 'nowrap') return;
  try {
    let fs = parseFloat(getComputedStyle(h1).fontSize) || 44;
    let guard = 0;
    while (h1.scrollWidth > h1.clientWidth + 1 && fs > 16 && guard < 60){
      fs -= 1;
      h1.style.fontSize = fs + 'px';
      guard++;
    }
  } catch(e){}
}

function setupReveals(){
  if (revealObs) revealObs.disconnect();
  revealObs = new IntersectionObserver((ents)=>{
    ents.forEach(e=>{ if (e.isIntersecting){ e.target.classList.add('vis'); revealObs.unobserve(e.target); } });
  }, {threshold:0.12});
  document.querySelectorAll('.reveal').forEach(el=>revealObs.observe(el));
}

function updateProgress(){
  const doc = document.documentElement;
  const max = doc.scrollHeight - window.innerHeight;
  const pct = max>0 ? Math.min(100, Math.round(window.scrollY/max*100)) : 0;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLeft').textContent = t().moduleOf(state.currentModule+1, state.project.modules.length);
  document.getElementById('progressRight').textContent = pct+'% '+t().completed;
}
window.addEventListener('scroll', updateProgress, {passive:true});
window.addEventListener('resize', updateProgress);

function renderVerificationLanding(b64){
  const lang = params.get('lang') === 'en' ? 'en' : 'es';
  const L = lang === 'es' ? {
    title: 'Verificación de certificado', valid: '✓ Certificado válido', invalid: '✗ No se pudo verificar',
    course: 'Curso', name: 'Nombre', date: 'Fecha', score: 'Puntaje', code: 'Código',
    invalidMsg: 'Este enlace de verificación está incompleto o dañado.',
    footer: 'Verificado localmente en tu navegador, a partir de los datos incluidos en el propio código — no se consultó ningún servidor externo.'
  } : {
    title: 'Certificate verification', valid: '✓ Valid certificate', invalid: '✗ Could not be verified',
    course: 'Course', name: 'Name', date: 'Date', score: 'Score', code: 'Code',
    invalidMsg: 'This verification link is incomplete or corrupted.',
    footer: 'Verified locally in your browser, from the data embedded in the code itself \u2014 no external server was contacted.'
  };
  const data = decodeVerificationPayload(b64);
  let bodyHtml;
  if (!data || !data.n || !data.c || !data.d || !data.k){
    bodyHtml = `
      <div class="vlk-icon">✗</div>
      <h1 class="vlk-status bad">${esc(L.invalid)}</h1>
      <p class="vlk-msg">${esc(L.invalidMsg)}</p>`;
  } else {
    const recomputed = computeVerificationCode(`${data.n}|${data.c}|${data.d}`);
    const valid = recomputed === data.k;
    const rows = [
      [L.course, data.c], [L.name, data.n], [L.date, data.d],
      ...(data.s != null ? [[L.score, data.s + '%']] : []),
      [L.code, data.k]
    ];
    bodyHtml = `
      <div class="vlk-icon">${valid?'✓':'✗'}</div>
      <h1 class="vlk-status ${valid?'ok':'bad'}">${esc(valid?L.valid:L.invalid)}</h1>
      <table class="vlk-table">${rows.map(([k,v])=>`<tr><td>${esc(k)}</td><td>${esc(String(v))}</td></tr>`).join('')}</table>`;
  }
  document.documentElement.lang = lang;
  document.title = L.title;
  document.body.innerHTML = `
    <style>
      body{margin:0;font-family:'IBM Plex Sans',Arial,sans-serif;background:#f4f4f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box;}
      .vlk-card{background:#fff;border-radius:14px;max-width:420px;width:100%;padding:40px 32px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.12);}
      .vlk-icon{font-size:44px;line-height:1;margin-bottom:10px;}
      .vlk-status{font-size:19px;font-weight:700;margin:0 0 20px;}
      .vlk-status.ok{color:#2e8b57;}
      .vlk-status.bad{color:#B0342F;}
      .vlk-msg{font-size:14px;color:#666;line-height:1.6;}
      .vlk-table{width:100%;border-collapse:collapse;text-align:left;margin-top:6px;}
      .vlk-table td{padding:9px 4px;border-bottom:1px solid #eee;font-size:13.5px;color:#333;}
      .vlk-table td:first-child{color:#999;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.4px;text-transform:uppercase;width:38%;}
      .vlk-footer{margin-top:22px;font-size:10.5px;color:#aaa;line-height:1.5;}
    </style>
    <div class="vlk-card">
      ${bodyHtml}
      <div class="vlk-footer">${esc(L.footer)}</div>
    </div>`;
}

/* ---------------- Init ---------------- */
(function init(){
  const verifyParam = params.get('verify');
  if (verifyParam){
    const showVerify = ()=>renderVerificationLanding(verifyParam);
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', showVerify);
    else showVerify();
    return;
  }
  state.project = migrateProject(loadProject() || seedProject());
  if (!loadProject()) saveProject(true);
  try {
    const lastId = localStorage.getItem(LASTMOD_KEY);
    if (lastId){
      const idx = state.project.modules.findIndex(m=>m.id===lastId);
      if (idx >= 0) state.currentModule = idx;
    }
  } catch(e){}
  try { document.execCommand('defaultParagraphSeparator', false, 'br'); } catch(e){}
  const boot = ()=>renderAll();
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();
</script>
